    function fmtDate(d) {
      if (!d) return "";
      const dt = new Date(d + "T00:00:00");
      return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }
    function parseDate(s) { return s ? new Date(s + "T00:00:00") : null; }
    function daysBetween(a, b) { return Math.round((b - a) / 86400000); }
    function durationLabel(a, b) {
      const totalDays = daysBetween(a, b);
      if (totalDays <= 0) return "0 d";
      const years = Math.floor(totalDays / 365.25);
      const remAfterYears = totalDays - Math.round(years * 365.25);
      const months = Math.floor(remAfterYears / 30.44);
      const remAfterMonths = Math.round(remAfterYears - months * 30.44);
      const weeks = Math.floor(remAfterMonths / 7);
      const days = remAfterMonths % 7;
      const parts = [];
      if (years > 0) parts.push(`${years} yr`);
      if (months > 0) parts.push(`${months} mo`);
      if (weeks > 0) parts.push(`${weeks} wk`);
      if (days > 0 && years === 0 && months === 0) parts.push(`${days} d`);
      return parts.join(" ") || "0 d";
    }
    function sgnFmt(n, decimals = 2) {
      if (n === null || n === undefined || isNaN(n)) return "-";
      return (n >= 0 ? "+" : "") + n.toFixed(decimals);
    }
    function displayName(fullName) {
      if (!fullName) return "";
      const parts = fullName.trim().split(/\s+/);
      if (parts.length === 1) return parts[0];
      return `${parts[0]} ${parts[parts.length - 1][0]}.`;
    }
    function ageLabel(dob) {
      if (!dob) return "";
      const birth = new Date(dob + "T00:00:00");
      const now = new Date();
      let years = now.getFullYear() - birth.getFullYear();
      let months = now.getMonth() - birth.getMonth();
      if (months < 0) { years--; months += 12; }
      const parts = [];
      if (years > 0) parts.push(`${years} yr`);
      if (months > 0) parts.push(`${months} mo`);
      return parts.join(" ") || "< 1 mo";
    }

        ...(p.lensHistory||[]).map(x=>x.date),
        ...(p.bvEntries||[]).map(x=>x.date),
      ].filter(Boolean);
      return dates.length ? dates.sort().reverse()[0] : "";
    }

    // Most recent therapy start or program renewal date
    function getTherapyDate(p) {
      const renewals = (p.adminEvents||[])
        .filter(e => e.type === "Program Renewal")
        .map(e => e.date)
        .filter(Boolean);
      const candidates = [
        ...(p.therapyStartDate ? [p.therapyStartDate] : []),
        ...renewals,
      ].filter(Boolean);
      return candidates.length ? candidates.sort().reverse()[0] : "";
    }

    function getAlerts(patients) {
      const now = new Date();
      const alerts = [];
      for (const p of patients) {
        if (!Array.isArray(p.dismissedAlerts)) p.dismissedAlerts = [];
        if (p.warrantyOrderDate && p.therapy === "Ortho-K") {
          const orderDt = parseDate(p.warrantyOrderDate);
          const expiryDt = new Date(orderDt.getTime() + 4 * 30.44 * 86400000);
          const daysLeft = daysBetween(now, expiryDt);
          const alertId = `warranty-${p.id}`;
          if (daysLeft <= 60 && !p.dismissedAlerts.includes(alertId)) {
            const isExpired = daysLeft < 0;
            const expiryA = isExpired ? now : expiryDt;
            const expiryB = isExpired ? expiryDt : now;
            const timeStr = durationLabel(expiryB, expiryA);
            alerts.push({ id: alertId, patientId: p.id, patientName: p.name, type: "warranty", label: isExpired ? `Ortho-K warranty expired ${timeStr} ago` : `Ortho-K warranty expires in ${timeStr}`, severity: daysLeft < 14 ? "high" : "medium" });
          }
        }
        const als = [...(p.alMeasurements || [])].sort((a, b) => a.date.localeCompare(b.date));
        if (als.length >= 2) {
          const last = als[als.length - 1], prev = als[als.length - 2];
          const days = daysBetween(parseDate(prev.date), parseDate(last.date));
          if (days > 0) {
            const annualized = ((parseFloat(last.od) - parseFloat(prev.od)) / days) * 365;
            const alertId = `al-prog-${p.id}`;
            if (annualized > 0.3 && !p.dismissedAlerts.includes(alertId))
              alerts.push({ id: alertId, patientId: p.id, patientName: p.name, type: "progression", label: `Progressing AL: ${sgnFmt(annualized)} mm/yr annualized (OD)`, severity: annualized > 0.5 ? "high" : "medium" });
          }
        }
      }
      return alerts;
    }

    function generateStory(patient) {
      const als = [...(patient.alMeasurements || [])].sort((a, b) => a.date.localeCompare(b.date));
      if (als.length < 2) return { narrative: "Not enough data to generate a clinical story.", tableRows: [], clinicalNotes: [], interpretation: "" };
      const latest = als[als.length - 1], baseline = als[0];
      const latestDt = parseDate(latest.date), baselineDt = parseDate(baseline.date);
      const totalDays = daysBetween(baselineDt, latestDt);
      const totalOD = parseFloat(latest.od) - parseFloat(baseline.od), totalOS = parseFloat(latest.os) - parseFloat(baseline.os);
      const annualOD = totalDays > 0 ? (totalOD / totalDays) * 365 : 0;
      const annualOS = totalDays > 0 ? (totalOS / totalDays) * 365 : 0;
      const prev = als[als.length - 2];
      const prevDt = parseDate(prev.date);
      const intervalOD = parseFloat(latest.od) - parseFloat(prev.od), intervalOS = parseFloat(latest.os) - parseFloat(prev.os);
      const intervalLabel = durationLabel(prevDt, latestDt);
      const targets = [{ label: "~3 mo", days: 91 }, { label: "~6 mo", days: 182 }, { label: "~12 mo", days: 365 }, { label: "Baseline", days: totalDays }];
      const tableRows = [];
      for (const t of targets) {
        const closest = als.slice(0, -1).reduce((best, m) => {
          const diff = Math.abs(daysBetween(parseDate(m.date), latestDt) - t.days);
          return diff < Math.abs(daysBetween(parseDate(best.date), latestDt) - t.days) ? m : best;
        }, als[0]);
        const closestDays = daysBetween(parseDate(closest.date), latestDt);
        if (Math.abs(closestDays - t.days) > t.days * 0.5) continue;
        tableRows.push({ label: t.label === "Baseline" ? "Baseline" : durationLabel(parseDate(closest.date), latestDt), date: closest.date, dOD: latest.od - closest.od, dOS: latest.os - closest.os });
      }
      const clinicalNotes = (patient.clinicalEvents || []).filter(e => { const ed = parseDate(e.date); return ed >= baselineDt && ed <= latestDt; }).map(e => `${fmtDate(e.date)}: ${e.type}${e.notes ? " — " + e.notes : ""}`);
      let interp = annualOD <= 0.10 ? "AL growth is minimal and may indicate near-stabilization."
        : annualOD <= 0.20 ? "AL growth is below the high-risk threshold. Current treatment appears to be providing good control."
        : annualOD <= 0.30 ? "AL growth is moderate. Consider whether intensification or combination therapy is warranted."
        : "AL growth exceeds 0.30 mm/yr. Evaluate treatment escalation or combination therapy.";
      const rxs = [...(patient.refractions || [])].sort((a, b) => a.date.localeCompare(b.date));
      const baselineRx = rxs[0], latestRx = rxs[rxs.length - 1];
      const fmtSph = (s) => s !== undefined ? `${Number(s) >= 0 ? "+" : ""}${Number(s).toFixed(2)}` : "–";
      let rxSentence = "";
      if (latestRx) {
        const lStr = `OD ${fmtSph(latestRx.odSph)}${latestRx.odCyl && latestRx.odCyl !== 0 ? ` ${fmtSph(latestRx.odCyl)} ×${latestRx.odAxis}°` : " sph"} / OS ${fmtSph(latestRx.osSph)}${latestRx.osCyl && latestRx.osCyl !== 0 ? ` ${fmtSph(latestRx.osCyl)} ×${latestRx.osAxis}°` : " sph"}`;
        if (baselineRx && baselineRx.date !== latestRx.date) {
          const bStr = `OD ${fmtSph(baselineRx.odSph)} / OS ${fmtSph(baselineRx.osSph)}`;
          rxSentence = ` Refractive error progressed from ${bStr} at baseline to ${lStr}, a change of ${fmtSph(Number(latestRx.odSph) - Number(baselineRx.odSph))} D OD and ${fmtSph(Number(latestRx.osSph) - Number(baselineRx.osSph))} D OS.`;
        } else { rxSentence = ` Current refractive error is ${lStr}.`; }
      }
      const narrative = `${displayName(patient.name)} has been followed from baseline on ${fmtDate(baseline.date)} through ${fmtDate(latest.date)} — ${durationLabel(baselineDt, latestDt)}. Total axial length growth: ${sgnFmt(totalOD)} mm OD and ${sgnFmt(totalOS)} mm OS, yielding ${sgnFmt(annualOD)} mm/yr OD and ${sgnFmt(annualOS)} mm/yr OS. The most recent interval (${intervalLabel}) showed ${sgnFmt(intervalOD)} mm OD and ${sgnFmt(intervalOS)} mm OS.${rxSentence}`;
      return { narrative, tableRows, clinicalNotes, interpretation: interp, annualOD, annualOS, baseline, latest };
    }

    const td = { padding: "8px 10px", border: "1px solid #f1f5f9", fontSize: 13, verticalAlign: "middle" };
    const inputStyle = { padding: "6px 8px", border: "1px solid #e2e8f0", borderRadius: 5, fontSize: 13, fontFamily: "'DM Sans', sans-serif", width: "100%", boxSizing: "border-box" };

    function btnStyle(bg) { return { background: bg, color: "#fff", border: "none", borderRadius: 6, padding: "7px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "'DM Sans', sans-serif" }; }

    function TherapyBadge({ therapy }) {

      return <span style={{ background: c.bg, color: c.text, border: `1px solid ${c.border}`, borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 600, whiteSpace: "nowrap" }}>{therapy}</span>;
    }

    function ALGraph({ patient }) {
      const canvasRef = useRef(null);
      const [tooltip, setTooltip] = useState(null);
      const pointsRef = useRef([]);

      const drawGraph = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const als = [...(patient.alMeasurements || [])].sort((a, b) => a.date.localeCompare(b.date));
        if (als.length < 2) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
        const W = canvas.width, H = canvas.height;
        const PAD = { top: 40, right: 40, bottom: 55, left: 62 };
        ctx.clearRect(0, 0, W, H);
        const allVals = als.flatMap(m => [m.od, m.os]);
        const minV = Math.min(...allVals) - 0.15, maxV = Math.max(...allVals) + 0.15;
        const dates = als.map(m => parseDate(m.date).getTime());
        const minD = Math.min(...dates), maxD = Math.max(...dates);
        const toX = d => PAD.left + ((d - minD) / (maxD - minD || 1)) * (W - PAD.left - PAD.right);
        const toY = v => H - PAD.bottom - ((v - minV) / (maxV - minV || 1)) * (H - PAD.top - PAD.bottom);
        ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
          const v = minV + (maxV - minV) * (i / 4), y = toY(v);
          ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
          ctx.fillStyle = "#94a3b8"; ctx.font = "10px sans-serif"; ctx.textAlign = "right";
          ctx.fillText(v.toFixed(2), PAD.left - 5, y + 4);
        }
        if (patient.therapyStartDate) {
          const startTs = parseDate(patient.therapyStartDate).getTime();
          if (startTs >= minD && startTs <= maxD) {
            const x = toX(startTs);
            ctx.strokeStyle = "#22c55e"; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
            ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, H - PAD.bottom); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = "#22c55e"; ctx.font = "9px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("Tx start", x, PAD.top - 5);
          }
        }
        // Tx Change events (yellow)
        (patient.clinicalEvents || []).filter(e => e.type === "Treatment Change").map(e => parseDate(e.date).getTime()).filter(t => t >= minD && t <= maxD).forEach(t => {
          const x = toX(t);
          ctx.strokeStyle = "#fbbf24"; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
          ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, H - PAD.bottom); ctx.stroke();
          ctx.setLineDash([]);
        });
        (patient.refractions || []).map(e => parseDate(e.date).getTime()).filter(t => t >= minD && t <= maxD).forEach(t => {
          const x = toX(t);
          ctx.strokeStyle = "#a78bfa"; ctx.lineWidth = 1; ctx.setLineDash([2, 4]);
          ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, H - PAD.bottom); ctx.stroke();
          ctx.setLineDash([]);
        });
        ctx.strokeStyle = "#0f4c75"; ctx.lineWidth = 2.5; ctx.beginPath();
        als.forEach((m, i) => { const x = toX(parseDate(m.date).getTime()), y = toY(m.od); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.stroke();
        als.forEach(m => { const x = toX(parseDate(m.date).getTime()), y = toY(m.od); ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fillStyle = "#0f4c75"; ctx.fill(); ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.stroke(); });
        ctx.strokeStyle = "#3b82f6"; ctx.lineWidth = 2.5; ctx.beginPath();
        als.forEach((m, i) => { const x = toX(parseDate(m.date).getTime()), y = toY(m.os); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.stroke();
        als.forEach(m => { const x = toX(parseDate(m.date).getTime()), y = toY(m.os); ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fillStyle = "#3b82f6"; ctx.fill(); ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.stroke(); });
        ctx.fillStyle = "#64748b"; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
        als.forEach(m => { ctx.fillText(m.date.slice(0, 7), toX(parseDate(m.date).getTime()), H - PAD.bottom + 16); });
        const legY = H - 14;
        [[PAD.left, "#0f4c75", "OD"], [PAD.left + 50, "#3b82f6", "OS"], [PAD.left + 100, "#fbbf24", "Tx Change"], [PAD.left + 185, "#a78bfa", "Rx visit"], [PAD.left + 250, "#22c55e", "Tx start"]].forEach(([x, col, label]) => {
          ctx.fillStyle = col; ctx.fillRect(x, legY - 4, 14, 4);
          ctx.fillStyle = "#374151"; ctx.font = "10px sans-serif"; ctx.textAlign = "left"; ctx.fillText(label, x + 18, legY);
        });
        const rxMap = {};
        (patient.refractions || []).forEach(r => { rxMap[r.date] = r; });
        pointsRef.current = als.map(m => ({ date: m.date, od: m.od, os: m.os, xOD: toX(parseDate(m.date).getTime()), yOD: toY(m.od), yOS: toY(m.os), rx: rxMap[m.date] || null }));
      }, [patient]);

      useEffect(() => { const t = setTimeout(() => drawGraph(), 60); return () => clearTimeout(t); }, [drawGraph]);
      useEffect(() => { const onResize = () => drawGraph(); window.addEventListener("resize", onResize); return () => window.removeEventListener("resize", onResize); }, [drawGraph]);

      const handleMouseMove = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);
        let found = null;
        for (const pt of pointsRef.current) {
          if (Math.hypot(mx - pt.xOD, my - pt.yOD) < 12 || Math.hypot(mx - pt.xOD, my - pt.yOS) < 12) {
            found = { date: pt.date, od: pt.od, os: pt.os, rx: pt.rx, x: e.clientX - rect.left, y: e.clientY - rect.top };
            break;
          }
        }
        setTooltip(found);
      };

      return (
        <div style={{ position: "relative" }}>
          <canvas ref={canvasRef} width={700} height={300}
            style={{ width: "100%", height: "auto", borderRadius: 8, background: "#f8fafc", cursor: "crosshair", display: "block" }}
            onMouseMove={handleMouseMove} onMouseLeave={() => setTooltip(null)} />
          {tooltip && (
            <div style={{ position: "absolute", left: tooltip.x + 12, top: tooltip.y - 10, background: "#1e293b", color: "#fff", borderRadius: 8, padding: "8px 12px", fontSize: 12, pointerEvents: "none", zIndex: 10, whiteSpace: "nowrap", boxShadow: "0 4px 12px rgba(0,0,0,0.3)" }}>
              <div style={{ fontWeight: 700, marginBottom: 4 }}>{fmtDate(tooltip.date)}</div>
              <div style={{ color: "#fca5a5" }}>OD: {tooltip.od} mm</div>
              <div style={{ color: "#93c5fd" }}>OS: {tooltip.os} mm</div>
              {tooltip.rx && (
                <div style={{ marginTop: 6, paddingTop: 6, borderTop: "1px solid rgba(255,255,255,0.15)" }}>
                  <div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 2 }}>Refraction</div>
                  <div style={{ color: "#fca5a5" }}>OD {tooltip.rx.odSph >= 0 ? "+" : ""}{Number(tooltip.rx.odSph).toFixed(2)} {tooltip.rx.odCyl !== 0 ? `${tooltip.rx.odCyl >= 0 ? "+" : ""}${Number(tooltip.rx.odCyl).toFixed(2)} ×${tooltip.rx.odAxis}°` : "sph"}</div>
                  <div style={{ color: "#93c5fd" }}>OS {tooltip.rx.osSph >= 0 ? "+" : ""}{Number(tooltip.rx.osSph).toFixed(2)} {tooltip.rx.osCyl !== 0 ? `${tooltip.rx.osCyl >= 0 ? "+" : ""}${Number(tooltip.rx.osCyl).toFixed(2)} ×${tooltip.rx.osAxis}°` : "sph"}</div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── Overview Tab ──────────────────────────────────────────────────────────
    function OverviewTab({ patient, onUpdate, clinicalTypes, adminTypes }) {
      const als = [...(patient.alMeasurements || [])].sort((a, b) => a.date.localeCompare(b.date));
      const latest = als[als.length - 1], baseline = als[0];

      const emptyAL   = () => ({ date: today(), od: "", os: "", notes: "" });
      const emptyRx   = () => ({ date: today(), odSph: "", odCyl: "", odAxis: "", odVA: "20/20", osSph: "", osCyl: "", osAxis: "", osVA: "20/20", notes: "" });
      const emptyClin = () => ({ date: today(), type: (clinicalTypes||DEFAULT_CLINICAL_TYPES)[0], notes: "" });
      const emptyAdm  = () => ({ date: today(), type: (adminTypes||DEFAULT_ADMIN_TYPES)[0], notes: "" });

      const [alForm,   setAlForm]   = useState(emptyAL());
      const [rxForm,   setRxForm]   = useState(emptyRx());
      const [clinForm, setClinForm] = useState(emptyClin());
      const [admForm,  setAdmForm]  = useState(emptyAdm());
      const [flash, setFlash] = useState({ al: false, rx: false, clin: false, adm: false });

      const doFlash = (key) => { setFlash(f => ({ ...f, [key]: true })); setTimeout(() => setFlash(f => ({ ...f, [key]: false })), 2000); };

      const saveAL = () => {
        if (!alForm.date || !alForm.od || !alForm.os) return;
        onUpdate({ ...patient, alMeasurements: [...(patient.alMeasurements||[]), { id: uid(), ...alForm, od: parseFloat(alForm.od), os: parseFloat(alForm.os) }] });
        setAlForm(emptyAL()); doFlash("al");
      };
      const saveRx = () => {
        if (!rxForm.date || !rxForm.odSph || !rxForm.osSph) return;
        onUpdate({ ...patient, refractions: [...(patient.refractions||[]), { id: uid(), ...rxForm, odSph: parseFloat(rxForm.odSph), odCyl: parseFloat(rxForm.odCyl||0), odAxis: parseInt(rxForm.odAxis||0), osSph: parseFloat(rxForm.osSph), osCyl: parseFloat(rxForm.osCyl||0), osAxis: parseInt(rxForm.osAxis||0) }] });
        setRxForm(emptyRx()); doFlash("rx");
      };
      const saveClin = () => {
        if (!clinForm.date || !clinForm.type) return;
        onUpdate({ ...patient, clinicalEvents: [...(patient.clinicalEvents||[]), { id: uid(), ...clinForm }] });
        setClinForm(emptyClin()); doFlash("clin");
      };
      const saveAdm = () => {
        if (!admForm.date || !admForm.type) return;
        onUpdate({ ...patient, adminEvents: [...(patient.adminEvents||[]), { id: uid(), ...admForm }] });
        setAdmForm(emptyAdm()); doFlash("adm");
      };

      const qs = { background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10, padding: "13px 15px", marginBottom: 10 };
      const qHdr = (color, icon, text) => <div style={{ fontSize: 11, fontWeight: 700, color, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>{icon} {text}</div>;
      const savedBadge = (key) => flash[key] ? <span style={{ fontSize: 11, color: "#16a34a", fontWeight: 600, marginLeft: 8 }}>✓ Saved</span> : null;

      return (
        <div>
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 10 }}>Quick Add</div>

            {/* AL */}
            <div style={qs}>
              {qHdr("#0f4c75", "📏", "Axial Length")}
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
                <label style={labelStyle}>Date<input type="date" value={alForm.date} onChange={e => setAlForm(f => ({...f,date:e.target.value}))} style={inputStyle} /></label>
                <label style={{...labelStyle,flex:"0 0 80px"}}>OD (mm)<input type="number" step="0.01" placeholder="24.00" value={alForm.od} onChange={e => setAlForm(f => ({...f,od:e.target.value}))} style={inputStyle} /></label>
                <label style={{...labelStyle,flex:"0 0 80px"}}>OS (mm)<input type="number" step="0.01" placeholder="24.00" value={alForm.os} onChange={e => setAlForm(f => ({...f,os:e.target.value}))} style={inputStyle} /></label>
                <label style={{...labelStyle,flex:"1 1 120px",maxWidth:200}}>Notes<input value={alForm.notes} onChange={e => setAlForm(f => ({...f,notes:e.target.value}))} style={inputStyle} /></label>
                <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                  <button onClick={saveAL} style={btnStyle("#0f4c75")}>Save</button>

                  {flash.al && <span style={{fontSize:11,color:"#16a34a",fontWeight:600}}>✓ Saved</span>}
                </div>
              </div>
            </div>

            {/* Refraction — table layout with fixed columns */}
            <div style={qs}>
              {qHdr("#0e7490", "🔍", "Refraction")}
              <table style={{ borderCollapse: "collapse", fontSize: 12 }}>
                <colgroup>
                  <col style={{ width: 28 }} />
                  <col style={{ width: 130 }} />
                  <col style={{ width: 68 }} />
                  <col style={{ width: 68 }} />
                  <col style={{ width: 56 }} />
                  <col style={{ width: 56 }} />
                  <col style={{ width: 130 }} />
                  <col style={{ width: 90 }} />
                </colgroup>
                <thead>
                  <tr>
                    <td></td>
                    <td style={{ fontSize: 10, color: "#64748b", fontWeight: 700, paddingBottom: 3 }}>Date</td>
                    <td style={{ fontSize: 10, color: "#64748b", fontWeight: 700, textAlign: "center", paddingBottom: 3 }}>Sph</td>
                    <td style={{ fontSize: 10, color: "#64748b", fontWeight: 700, textAlign: "center", paddingBottom: 3 }}>Cyl</td>
                    <td style={{ fontSize: 10, color: "#64748b", fontWeight: 700, textAlign: "center", paddingBottom: 3 }}>Axis</td>
                    <td style={{ fontSize: 10, color: "#64748b", fontWeight: 700, textAlign: "center", paddingBottom: 3 }}>VA</td>
                    <td style={{ fontSize: 10, color: "#64748b", fontWeight: 700, paddingBottom: 3, paddingLeft: 4 }}>Notes</td>
                    <td></td>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td style={{ fontWeight: 700, fontSize: 12, color: "#0f4c75", paddingRight: 6, verticalAlign: "middle" }}>OD</td>
                    <td style={{ paddingRight: 6, paddingBottom: 4 }}>
                      <input type="date" value={rxForm.date} onChange={e => setRxForm(f => ({...f,date:e.target.value}))} style={{ ...inputStyle, fontSize: 12, width: "100%" }} />
                    </td>
                    <td style={{ paddingRight: 4, paddingBottom: 4 }}><input type="number" step="0.25" placeholder="-3.00" value={rxForm.odSph} onChange={e=>setRxForm(f=>({...f,odSph:e.target.value}))} style={{...inputStyle,textAlign:"center"}} /></td>
                    <td style={{ paddingRight: 4, paddingBottom: 4 }}><input type="number" step="0.25" placeholder="0.00" value={rxForm.odCyl} onChange={e=>setRxForm(f=>({...f,odCyl:e.target.value}))} style={{...inputStyle,textAlign:"center"}} /></td>
                    <td style={{ paddingRight: 4, paddingBottom: 4 }}><input type="number" step="1" placeholder="180" value={rxForm.odAxis} onChange={e=>setRxForm(f=>({...f,odAxis:e.target.value}))} style={{...inputStyle,textAlign:"center"}} /></td>
                    <td style={{ paddingRight: 4, paddingBottom: 4 }}><input placeholder="20/20" value={rxForm.odVA} onChange={e=>setRxForm(f=>({...f,odVA:e.target.value}))} style={{...inputStyle,textAlign:"center"}} /></td>
                    <td rowSpan={2} style={{ paddingLeft: 4, verticalAlign: "middle" }}>
                      <input value={rxForm.notes} onChange={e => setRxForm(f => ({...f, notes: e.target.value}))} placeholder="Notes…" style={{ ...inputStyle, width: "100%", boxSizing: "border-box" }} />
                    </td>
                    <td></td>
                  </tr>
                  <tr>
                    <td style={{ fontWeight: 700, fontSize: 12, color: "#3b82f6", paddingRight: 6, verticalAlign: "middle" }}>OS</td>
                    <td style={{ paddingRight: 6 }}></td>
                    <td style={{ paddingRight: 4 }}><input type="number" step="0.25" placeholder="-3.00" value={rxForm.osSph} onChange={e=>setRxForm(f=>({...f,osSph:e.target.value}))} style={{...inputStyle,textAlign:"center"}} /></td>
                    <td style={{ paddingRight: 4 }}><input type="number" step="0.25" placeholder="0.00" value={rxForm.osCyl} onChange={e=>setRxForm(f=>({...f,osCyl:e.target.value}))} style={{...inputStyle,textAlign:"center"}} /></td>
                    <td style={{ paddingRight: 4 }}><input type="number" step="1" placeholder="180" value={rxForm.osAxis} onChange={e=>setRxForm(f=>({...f,osAxis:e.target.value}))} style={{...inputStyle,textAlign:"center"}} /></td>
                    <td style={{ paddingRight: 4 }}><input placeholder="20/20" value={rxForm.osVA} onChange={e=>setRxForm(f=>({...f,osVA:e.target.value}))} style={{...inputStyle,textAlign:"center"}} /></td>
                    <td style={{ verticalAlign: "middle", paddingLeft: 4, whiteSpace: "nowrap" }}>
                      <button onClick={saveRx} style={btnStyle("#0f4c75")}>Save</button>
                      {flash.rx && <span style={{fontSize:11,color:"#16a34a",fontWeight:600,marginLeft:6}}>✓</span>}
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            {/* Clinical Note */}
            <div style={qs}>
              {qHdr("#1d4ed8", "🩺", "Clinical Note")}
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
                <label style={labelStyle}>Date<input type="date" value={clinForm.date} onChange={e=>setClinForm(f=>({...f,date:e.target.value}))} style={inputStyle} /></label>
                <label style={{...labelStyle,flex:"1 1 160px"}}>Type<select value={clinForm.type} onChange={e=>setClinForm(f=>({...f,type:e.target.value}))} style={{...inputStyle,minWidth:0}}>{(clinicalTypes||DEFAULT_CLINICAL_TYPES).map(t=><option key={t}>{t}</option>)}</select></label>
                <label style={{...labelStyle,flex:"2 1 180px"}}>Notes<input value={clinForm.notes} onChange={e=>setClinForm(f=>({...f,notes:e.target.value}))} style={inputStyle} /></label>
                <div style={{display:"flex",alignItems:"center"}}>
                  <button onClick={saveClin} style={btnStyle("#0f4c75")}>Save</button>
                  {savedBadge("clin")}
                </div>
              </div>
            </div>

            {/* Admin Note */}
            <div style={{...qs,marginBottom:0}}>
              {qHdr("#475569", "📋", "Admin Note")}
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
                <label style={labelStyle}>Date<input type="date" value={admForm.date} onChange={e=>setAdmForm(f=>({...f,date:e.target.value}))} style={inputStyle} /></label>
                <label style={{...labelStyle,flex:"1 1 160px"}}>Type<select value={admForm.type} onChange={e=>setAdmForm(f=>({...f,type:e.target.value}))} style={{...inputStyle,minWidth:0}}>{(adminTypes||DEFAULT_ADMIN_TYPES).map(t=><option key={t}>{t}</option>)}</select></label>
                <label style={{...labelStyle,flex:"2 1 180px"}}>Notes<input value={admForm.notes} onChange={e=>setAdmForm(f=>({...f,notes:e.target.value}))} style={inputStyle} /></label>
                <div style={{display:"flex",alignItems:"center"}}>
                  <button onClick={saveAdm} style={btnStyle("#0f4c75")}>Save</button>
                  {savedBadge("adm")}
                </div>
              </div>
            </div>
          </div>

          {/* Stats cards */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 14, marginBottom: 22 }}>
            {[
              { label: "AL Measurements", value: als.length, icon: "📏" },
              { label: "Total OD Growth", value: latest && baseline ? `+${(parseFloat(latest.od) - parseFloat(baseline.od)).toFixed(2)} mm` : "–", icon: "→" },
              { label: "Total OS Growth", value: latest && baseline ? `+${(parseFloat(latest.os) - parseFloat(baseline.os)).toFixed(2)} mm` : "–", icon: "→" },
              { label: "Latest AL OD", value: latest ? `${latest.od} mm` : "–", icon: "👁" },
              { label: "Latest AL OS", value: latest ? `${latest.os} mm` : "–", icon: "👁" },

            ].map(s => (
              <div key={s.label} style={{ background: "#f8fafc", borderRadius: 10, padding: "14px 16px", border: "1px solid #e2e8f0" }}>
                <div style={{ fontSize: 22, marginBottom: 4 }}>{s.icon}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#0f4c75" }}>{s.value}</div>
                <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {als.length >= 2 && (() => {
            const story = generateStory(patient);
            return (
              <div style={{ background: "#f0f9ff", border: "1px solid #bae6fd", borderRadius: 10, padding: "16px 18px" }}>
                <div style={{ fontWeight: 700, color: "#0369a1", fontSize: 13, marginBottom: 6 }}>Clinical Summary</div>
                <p style={{ fontSize: 13, color: "#0c4a6e", lineHeight: 1.7, margin: 0 }}>{story.narrative}</p>
                <div style={{ marginTop: 10, padding: "10px 12px", background: "#fff", borderRadius: 8, border: "1px solid #e0f2fe", fontSize: 13, color: "#1e40af" }}>
                  <strong>Clinical Interpretation:</strong> {story.interpretation}
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    // ── Unified Timeline Tab (replaces both Timeline and AL & Refractions) ─────
    function UnifiedTimelineTab({ patient, onUpdate, pushUndo, undoStack, setUndoStack, clinicalTypes, adminTypes }) {
      const [cols, setCols] = useState({ al: true, rx: true, clinical: true, admin: true, lens: true });
      const [addingAL, setAddingAL] = useState(false);
      const [addingRx, setAddingRx] = useState(false);
      const [showStory, setShowStory] = useState(false);
      const [storyData, setStoryData] = useState(null);
      const [alForm, setAlForm] = useState({ date: today(), od: "", os: "", notes: "" });
      const [rxForm, setRxForm] = useState({ date: today(), odSph: "", odCyl: "", odAxis: "", odVA: "20/20", osSph: "", osCyl: "", osAxis: "", osVA: "20/20" });

      const als = [...(patient.alMeasurements || [])].sort((a, b) => b.date.localeCompare(a.date));
      const alsAsc = [...(patient.alMeasurements || [])].sort((a, b) => a.date.localeCompare(b.date));
      const rxs = [...(patient.refractions || [])].sort((a, b) => b.date.localeCompare(a.date));

      // Build delta map for AL
      const deltaMap = {};
      alsAsc.forEach((m, i) => {
        if (i === 0) { deltaMap[m.id] = { deltaOD: null, deltaOS: null, deltaTime: null }; return; }
        const prev = alsAsc[i - 1];
        deltaMap[m.id] = { deltaOD: parseFloat(m.od) - parseFloat(prev.od), deltaOS: parseFloat(m.os) - parseFloat(prev.os), deltaTime: durationLabel(parseDate(prev.date), parseDate(m.date)) };
      });

      // Gather all dates
      const allDates = [...new Set([
        ...als.map(m => m.date),
        ...rxs.map(r => r.date),
        ...(patient.clinicalEvents||[]).map(e => e.date),
        ...(patient.adminEvents||[]).map(e => e.date),
        ...(patient.lensHistory||[]).map(l => l.date),
      ])].sort((a, b) => b.localeCompare(a));

      const COL_DEFS = [
        { key: "al", label: "📏 AL", color: "#0f4c75" },
        { key: "rx", label: "🔍 Rx", color: "#0891b2" },
        { key: "clinical", label: "🩺 Clinical", color: "#0f4c75" },
        { key: "admin", label: "📋 Admin", color: "#0891b2" },
        { key: "lens", label: "👁 Lens", color: "#0369a1" },
      ];

      const activeCols = COL_DEFS.filter(c => cols[c.key]);

      const addAL = () => {
        if (!alForm.date || !alForm.od || !alForm.os) return;
        onUpdate({ ...patient, alMeasurements: [...(patient.alMeasurements||[]), { id: uid(), ...alForm, od: parseFloat(alForm.od), os: parseFloat(alForm.os) }] });
        setAlForm({ date: today(), od: "", os: "", notes: "" }); setAddingAL(false);
      };
      const addRx = () => {
        if (!rxForm.date || !rxForm.odSph || !rxForm.osSph) return;
        onUpdate({ ...patient, refractions: [...(patient.refractions||[]), { id: uid(), ...rxForm, odSph: parseFloat(rxForm.odSph), odCyl: parseFloat(rxForm.odCyl||0), odAxis: parseInt(rxForm.odAxis||0), osSph: parseFloat(rxForm.osSph), osCyl: parseFloat(rxForm.osCyl||0), osAxis: parseInt(rxForm.osAxis||0) }] });
        setRxForm({ date: today(), odSph: "", odCyl: "", odAxis: "", odVA: "20/20", osSph: "", osCyl: "", osAxis: "", osVA: "20/20" }); setAddingRx(false);
      };
      const removeAL = (id) => { pushUndo({ type: "restoreAL", patientId: patient.id, item: patient.alMeasurements.find(x => x.id === id) }); onUpdate({ ...patient, alMeasurements: patient.alMeasurements.filter(x => x.id !== id) }); };
      const removeRx = (id) => { pushUndo({ type: "restoreRx", patientId: patient.id, item: patient.refractions.find(x => x.id === id) }); onUpdate({ ...patient, refractions: patient.refractions.filter(x => x.id !== id) }); };
      const rmClin = (id) => onUpdate({ ...patient, clinicalEvents: patient.clinicalEvents.filter(x => x.id !== id) });
      const rmAdm  = (id) => onUpdate({ ...patient, adminEvents: patient.adminEvents.filter(x => x.id !== id) });
      const handleUndo = () => {
        if (!undoStack.length) return;
        const last = undoStack[undoStack.length - 1];
        if (last.type === "restoreAL" && last.patientId === patient.id) onUpdate({ ...patient, alMeasurements: [...(patient.alMeasurements||[]), last.item] });
        else if (last.type === "restoreRx" && last.patientId === patient.id) onUpdate({ ...patient, refractions: [...(patient.refractions||[]), last.item] });
        setUndoStack(s => s.slice(0, -1));
      };

      const printTable = () => {
        const sortedDates = [...allDates].sort((a,b) => a.localeCompare(b));
        const rows = sortedDates.map(date => {
          const al = patient.alMeasurements?.find(m => m.date === date);
          const rx = patient.refractions?.find(r => r.date === date);
          return `<tr><td>${fmtDate(date)}</td><td>${al ? al.od : '–'}</td><td>${al ? al.os : '–'}</td><td>${rx ? `${rx.odSph >= 0 ? '+' : ''}${rx.odSph} ${rx.odCyl ? rx.odCyl + ' ×' + rx.odAxis : 'sph'}` : '–'}</td><td>${rx ? `${rx.osSph >= 0 ? '+' : ''}${rx.osSph} ${rx.osCyl ? rx.osCyl + ' ×' + rx.osAxis : 'sph'}` : '–'}</td><td>${al?.notes || ''}</td></tr>`;
        }).join('');
        const w = window.open('', '_blank');
        w.document.write(`<html><head><title>${displayName(patient.name)} — Timeline</title><style>body{font-family:Arial,sans-serif;padding:20px;font-size:12px}table{border-collapse:collapse;width:100%}th{background:#0f4c75;color:#fff;padding:6px 8px}td{border:1px solid #e2e8f0;padding:5px 8px}</style></head><body><h2>${displayName(patient.name)} — Timeline</h2><table><thead><tr><th>Date</th><th>OD AL</th><th>OS AL</th><th>OD Rx</th><th>OS Rx</th><th>Notes</th></tr></thead><tbody>${rows}</tbody></table><script>window.print();<\/script></body></html>`);
        w.document.close();
      };

      function fmtRxCell(sph, cyl, axis) {
        const s = `${sph >= 0 ? "+" : ""}${Number(sph).toFixed(2)}`;
        if (!cyl || cyl === 0) return s + " sph";
        return `${s} ${cyl >= 0 ? "+" : ""}${Number(cyl).toFixed(2)} ×${axis}°`;
      }

      return (
        <div>
          {/* Toolbar */}
          <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
            <button onClick={() => setAddingAL(v => !v)} style={btnStyle("#0f4c75")}>+ AL</button>
            <button onClick={() => setAddingRx(v => !v)} style={btnStyle("#0891b2")}>+ Refraction</button>
            <button onClick={() => { setStoryData(generateStory(patient)); setShowStory(true); }} style={btnStyle("#0369a1")}>✨ Generate Story</button>
            <button onClick={printTable} style={btnStyle("#64748b")}>🖨 Print</button>
            {undoStack.some(u => u.patientId === patient.id) && <button onClick={handleUndo} style={btnStyle("#dc2626")}>↩ Undo</button>}
            <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
              {COL_DEFS.map(({ key, label, color }) => (
                <button key={key} onClick={() => setCols(c => ({ ...c, [key]: !c[key] }))}
                  style={{ background: cols[key] ? color : "#f1f5f9", color: cols[key] ? "#fff" : "#64748b", border: "none", borderRadius: 20, padding: "4px 12px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* Add forms */}
          {addingAL && (
            <div style={{ ...formCard, marginBottom: 12 }}>
              <div style={{ width: "100%", fontWeight: 600, fontSize: 13, marginBottom: 4 }}>New AL Measurement</div>
              {[["date","Date","date"],["od","OD (mm)","number"],["os","OS (mm)","number"]].map(([k,l,t]) => (
                <label key={k} style={labelStyle}>{l}<input type={t} step={t==="number"?"0.01":undefined} value={alForm[k]} onChange={e => setAlForm(f => ({ ...f, [k]: e.target.value }))} style={inputStyle} /></label>
              ))}
              <label style={{ ...labelStyle, flex: "1 1 200px" }}>Notes<input value={alForm.notes} onChange={e => setAlForm(f => ({ ...f, notes: e.target.value }))} style={inputStyle} /></label>
              <button onClick={addAL} style={btnStyle("#0f4c75")}>Save</button>
              <button onClick={() => setAddingAL(false)} style={btnStyle("#94a3b8")}>Cancel</button>
            </div>
          )}
          {addingRx && (
            <div style={{ ...formCard, marginBottom: 12 }}>
              <div style={{ width: "100%", fontWeight: 600, fontSize: 13, marginBottom: 4 }}>New Refraction</div>
              <label style={labelStyle}>Date<input type="date" value={rxForm.date} onChange={e => setRxForm(f => ({ ...f, date: e.target.value }))} style={inputStyle} /></label>
              {[["odSph","OD Sph"],["odCyl","OD Cyl"],["odAxis","OD Axis"],["osSph","OS Sph"],["osCyl","OS Cyl"],["osAxis","OS Axis"]].map(([k,l]) => (
                <label key={k} style={{ ...labelStyle, flex: "0 0 80px" }}>{l}<input value={rxForm[k]} onChange={e => setRxForm(f => ({ ...f, [k]: e.target.value }))} style={inputStyle} /></label>
              ))}
              <button onClick={addRx} style={btnStyle("#0891b2")}>Save</button>
              <button onClick={() => setAddingRx(false)} style={btnStyle("#94a3b8")}>Cancel</button>
            </div>
          )}

          {/* Unified table */}
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ background: "#0f4c75" }}>
                  <th style={{ ...th, background: "#0f4c75", color: "#fff", width: 90 }}>Date</th>
                  {cols.al && <>
                    <th style={{ ...th, background: "#fef2f2", color: "#0f4c75" }}>OD AL</th>
                    <th style={{ ...th, background: "#eff6ff", color: "#3b82f6" }}>OS AL</th>
                  </>}
                  {cols.rx && <>
                    <th style={{ ...th, background: "#f0f9ff", color: "#0891b2" }}>OD Rx</th>
                    <th style={{ ...th, background: "#f0f9ff", color: "#0891b2" }}>OS Rx</th>
                  </>}
                  {cols.clinical && <th style={{ ...th, background: "#f0f9ff", color: "#0f4c75" }}>🩺 Clinical</th>}
                  {cols.admin    && <th style={{ ...th, background: "#f0fdfa", color: "#0891b2" }}>📋 Admin</th>}
                  {cols.lens     && <th style={{ ...th, background: "#f0f9ff", color: "#0369a1" }}>👁 Lens</th>}
                  <th style={{ ...th, background: "#f1f5f9", width: 60 }}></th>
                </tr>
              </thead>
              <tbody>
                {allDates.map((date, rowIdx) => {
                  const alEntry = als.find(m => m.date === date);
                  const rxEntry = rxs.find(r => r.date === date);
                  const clinEntries = (patient.clinicalEvents||[]).filter(e => e.date === date);
                  const admEntries  = (patient.adminEvents||[]).filter(e => e.date === date);
                  const lensEntries = (patient.lensHistory||[]).filter(l => l.date === date);
                  if (!activeCols.some(c => {
                    if (c.key === "al") return !!alEntry;
                    if (c.key === "rx") return !!rxEntry;
                    if (c.key === "clinical") return clinEntries.length > 0;
                    if (c.key === "admin") return admEntries.length > 0;
                    if (c.key === "lens") return lensEntries.length > 0;
                    return false;
                  })) return null;

                  const alDelta = alEntry ? deltaMap[alEntry.id] : null;

                  return (
                    <tr key={date} style={{ background: rowIdx % 2 === 0 ? "#fff" : "#f8fafc" }}>
                      <td style={{ ...td, verticalAlign: "top", paddingTop: 10 }}>

    // ── Calculator constants ──────────────────────────────────────────────────
    const CALC_INT_EFFECT = { none:0, ortho_k:0.50, misight:0.55, atropine_01:0.20, atropine_05:0.50, stellest:0.575, mf_soft:0.40, combo:0.70, stellest_atro:0.65 };
    const CALC_INT_LABELS = { none:'No intervention', ortho_k:'Orthokeratology', misight:'MiSight 1 day', atropine_01:'Atropine 0.01%', atropine_05:'Atropine 0.05%', stellest:'Stellest/DIMS', mf_soft:'MF soft CL', combo:'Ortho-K + atropine', stellest_atro:'Stellest + atropine' };
    const CALC_ETH_MULT = { east_asian:1.55, south_asian:1.20, hispanic:1.10, white:1.00, black:0.75, mixed:1.05 };
    const CALC_ETH_LABELS = { east_asian:'East Asian', south_asian:'South Asian', hispanic:'Hispanic/Latino', white:'Caucasian', black:'African', mixed:'Mixed/Other' };
    function calcBaseProgRate(age) {
      if (age<7) return 1.10; if (age<9) return 0.90; if (age<11) return 0.75;
      if (age<13) return 0.65; if (age<15) return 0.45; if (age<17) return 0.25; return 0.10;
    }
    function calcPredictOnset(age, rx, al, ethnicity, parents, outdoor) {
      const em = CALC_ETH_MULT[ethnicity]||1.0;
      let plusReserve = (rx!==null&&rx!=='') ? parseFloat(rx) : 0.75;
      let annualLoss = 0.18*em;
      if (parents==2) annualLoss*=1.30; else if (parents==1) annualLoss*=1.15;
      if (outdoor==0) annualLoss*=1.20; else if (outdoor==2) annualLoss*=0.85;
      if (al!==null) { const normAL=22.0+(age-5)*0.1, excess=al-normAL; if(excess>1.0) annualLoss*=1.25; else if(excess>0.5) annualLoss*=1.12; }
      let simRx=plusReserve, simAge=age;
      while (simRx>0 && simAge<25) { simRx-=annualLoss; simAge++; }
      return simAge>=25 ? null : Math.round(simAge);
    }
    function calcComputeRisk(inputs) {
      let score=0; const factors=[];
      const {age,rx,al,onset,prog,ethnicity,parents,parent_rx,outdoor,nearwork,isPreMyope,predictedOnset,rf_premature,rf_urban,rf_asian_school,rf_atopy}=inputs;
      const em=CALC_ETH_MULT[ethnicity]||1.0;
      if (isPreMyope) {
        if (rx!==null&&rx<=0.50) { score+=20; factors.push({label:`Low hyperopic buffer (${rx>=0?'+':''}${rx}D)`,pts:20}); }
        else if (rx!==null&&rx<=1.00) { score+=10; factors.push({label:`Moderate hyperopic reserve (+${rx}D)`,pts:10}); }
        if (predictedOnset!==null) { const yrs=predictedOnset-age; if(yrs<=1){score+=20;factors.push({label:'Onset predicted within 1 year',pts:20});} else if(yrs<=2){score+=12;factors.push({label:'Onset predicted within 2 years',pts:12});} else if(yrs<=3){score+=6;factors.push({label:'Onset predicted within 3 years',pts:6});} }
      } else {
        if (onset!==null) { if(onset<=6){score+=25;factors.push({label:'Very early onset (<=6 yrs)',pts:25});} else if(onset<=8){score+=15;factors.push({label:'Early onset (<=8 yrs)',pts:15});} else if(onset<=10){score+=8;factors.push({label:'Onset <=10 yrs',pts:8});} }
        if (rx!==null) { if(rx<=-5){score+=22;factors.push({label:`High myopia (${rx}D)`,pts:22});} else if(rx<=-3){score+=14;factors.push({label:`Moderate myopia (${rx}D)`,pts:14});} else if(rx<=-1){score+=7;factors.push({label:`Low myopia (${rx}D)`,pts:7});} }
        if (prog&&prog>=0.75) { score+=15; factors.push({label:`Rapid progression (${prog}D/yr)`,pts:15}); }
      }
      if (al!==null) { const normAL=22.0+(age-5)*0.1, excess=al-normAL; if(excess>1.5){score+=18;factors.push({label:`AL ${al}mm (>1.5mm above norm)`,pts:18});} else if(excess>0.8){score+=10;factors.push({label:`AL ${al}mm (elongated for age)`,pts:10});} }
      if (parents==2){score+=20;factors.push({label:'Both parents myopic',pts:20});} else if(parents==1){score+=10;factors.push({label:'One parent myopic',pts:10});}
      if (parent_rx!==null&&parent_rx<=-4) { score+=8; factors.push({label:`Parental high myopia (${parent_rx}D)`,pts:8}); }
      if (em>=1.4){score+=12;factors.push({label:'East Asian ancestry',pts:12});} else if(em>=1.1){score+=6;factors.push({label:'South/Hispanic ancestry',pts:6});} else if(em<0.9){score-=5;factors.push({label:'African ancestry (lower risk)',pts:-5});}
      if (outdoor==0){score+=10;factors.push({label:'<1 hr/day outdoors',pts:10});} else if(outdoor==1){score+=4;factors.push({label:'1-2 hrs/day outdoors',pts:4});} else{score-=5;factors.push({label:'2+ hrs/day outdoors',pts:-5});}
      if (nearwork==2){score+=8;factors.push({label:'4+ hrs near work',pts:8});} else if(nearwork==1){score+=4;factors.push({label:'2-4 hrs near work',pts:4});}
      if (rf_premature){score+=5;factors.push({label:'Premature birth',pts:5});}
      if (rf_urban){score+=4;factors.push({label:'Urban environment',pts:4});}
      if (rf_asian_school){score+=5;factors.push({label:'High academic load',pts:5});}
      if (rf_atopy){score+=3;factors.push({label:'Atopic conditions',pts:3});}
      return { score:Math.max(0,Math.min(100,score)), factors };
    }
    function calcBuildProjection(inputs) {
      const {age,rx,prog,ethnicity,intervention,isPreMyope,predictedOnset}=inputs;
      const em=CALC_ETH_MULT[ethnicity]||1.0, intEffect=CALC_INT_EFFECT[intervention]||0;
      const maxAge=22; const ages=[],untreated=[],treated=[];
      function annualRate(a) { return (prog&&!isPreMyope) ? prog*em : calcBaseProgRate(a)*em; }
      if (isPreMyope) {
        const onsetAge=predictedOnset||(age+3), startPlus=(rx!==null&&rx!=='') ? parseFloat(rx) : 0.75;
        const steps=Math.max(onsetAge-age,1), annualDrop=startPlus/steps; let simPlus=startPlus;
        for(let a=age;a<=onsetAge;a++){ages.push(a);const v=+Math.max(simPlus,0).toFixed(2);untreated.push(v);treated.push(v);simPlus-=annualDrop;}
        let rxU=0,rxT=0;
        for(let a=onsetAge;a<maxAge;a++){const r=annualRate(a);rxU=Math.max(rxU-r,-22);rxT=Math.max(rxT-r*(1-intEffect),-22);ages.push(a+1);untreated.push(+rxU.toFixed(2));treated.push(+rxT.toFixed(2));}
      } else {
        let rxU=parseFloat(rx)||0,rxT=parseFloat(rx)||0;
        ages.push(age);untreated.push(+rxU.toFixed(2));treated.push(+rxT.toFixed(2));
        for(let a=age;a<maxAge;a++){const r=annualRate(a);rxU=Math.max(rxU-r,-22);rxT=Math.max(rxT-r*(1-intEffect),-22);ages.push(a+1);untreated.push(+rxU.toFixed(2));treated.push(+rxT.toFixed(2));}
      }
      return {ages,untreated,treated};
    }
    function getRiskTier(score) {
      if (score>=70) return {label:'High Risk',color:'#c94040',bg:'#fff1f2'};
      if (score>=45) return {label:'Moderate Risk',color:'#e8a245',bg:'#fef3c7'};
      if (score>=20) return {label:'Low-Moderate',color:'#2a7d6e',bg:'#e8f5f2'};
      return {label:'Low Risk',color:'#16a34a',bg:'#f0fdf4'};
    }

      const onsetFromData = () => { if(!patient.therapyStartDate||!patient.dob) return ''; const birth=new Date(patient.dob+"T00:00:00"),start=new Date(patient.therapyStartDate+"T00:00:00"); let y=start.getFullYear()-birth.getFullYear(); if(start.getMonth()<birth.getMonth()||(start.getMonth()===birth.getMonth()&&start.getDate()<birth.getDate())) y--; return String(Math.max(1,Math.min(y,20))); };
      const progFromAL = () => { if(als.length<2) return ''; const last=als[als.length-1],prev=als[als.length-2],days=daysBetween(parseDate(prev.date),parseDate(last.date)); return days>0 ? ((parseFloat(last.od)-parseFloat(prev.od))/days*365).toFixed(2) : ''; };

          `THE SPARK OPTOMETRY — MYOPIA MANAGEMENT REPORT`, `${"=".repeat(52)}`,
          `Patient: ${displayName(patient.name)}`, `DOB: ${fmtDate(patient.dob)}`,
          `Location: ${patient.location}`,
          `Therapy: ${patient.therapy}${patient.combinationTherapy ? " + " + patient.combinationTherapy : ""}`,
          `Status: ${patient.status}`, `Initiating Doctor: ${patient.initiatingDoctor}`,
          `Managing Doctor: ${patient.managingDoctor || patient.initiatingDoctor}`,
          patient.parent1Myopia ? `Parent 1 Myopia: ${patient.parent1Myopia}` : "",
          patient.parent2Myopia ? `Parent 2 Myopia: ${patient.parent2Myopia}` : "",
          ``,
          `AXIAL LENGTH MEASUREMENTS`, `${"─".repeat(40)}`,
          ...als.map(m => `${fmtDate(m.date)}  OD: ${m.od} mm  OS: ${m.os} mm${m.notes ? "  — " + m.notes : ""}`), ``,
          `REFRACTIONS`, `${"─".repeat(40)}`,
          ...rxs.map(r => `${fmtDate(r.date)}  OD: ${r.odSph>=0?"+":""}${r.odSph} ${r.odCyl} x${r.odAxis}  OS: ${r.osSph>=0?"+":""}${r.osSph} ${r.osCyl} x${r.osAxis}`), ``,
          `CLINICAL EVENTS`, `${"─".repeat(40)}`,

        ].filter(l => l !== "");
        const blob = new Blob([lines.join("\n")], { type: "text/plain" });

    function TypeListEditor({ title, icon, items, onChange, placeholder }) {
      const [newItem, setNewItem] = useState("");
      const move = (i, dir) => {
        const arr = [...items];
        const j = i + dir;
        if (j < 0 || j >= arr.length) return;
        [arr[i], arr[j]] = [arr[j], arr[i]];
        onChange(arr);
      };
      return (
        <div style={{ background: "#fff", borderRadius: 12, boxShadow: "0 2px 12px rgba(0,0,0,0.07)", padding: "20px 24px", marginBottom: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 15, color: "#0f4c75", marginBottom: 14 }}>{icon} {title}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 12 }}>
            {items.map((item, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, background: "#f8fafc", borderRadius: 8, padding: "7px 12px", border: "1px solid #e2e8f0" }}>
                <span style={{ flex: 1, fontSize: 13 }}>{item}</span>
                <button onClick={() => move(i, -1)} disabled={i === 0} style={{ background: "none", border: "1px solid #e2e8f0", borderRadius: 4, padding: "2px 6px", cursor: "pointer", color: "#64748b", fontSize: 12 }}>↑</button>
                <button onClick={() => move(i, 1)} disabled={i === items.length-1} style={{ background: "none", border: "1px solid #e2e8f0", borderRadius: 4, padding: "2px 6px", cursor: "pointer", color: "#64748b", fontSize: 12 }}>↓</button>
                <button onClick={() => onChange(items.filter((_,j) => j !== i))} style={{ background: "#fce7f3", border: "none", borderRadius: 5, padding: "3px 8px", cursor: "pointer", color: "#db2777", fontSize: 12 }}>✕</button>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <input value={newItem} onChange={e => setNewItem(e.target.value)} placeholder={placeholder}
              style={{ ...inputStyle, flex: 1 }}
              onKeyDown={e => { if (e.key === "Enter" && newItem.trim()) { onChange([...items, newItem.trim()]); setNewItem(""); }}} />
            <button onClick={() => { if (newItem.trim()) { onChange([...items, newItem.trim()]); setNewItem(""); }}} style={btnStyle("#0f4c75")}>Add</button>
          </div>
        </div>
      );
    }

    function MyopiaTracker() {
      const [authed, setAuthed] = useState(!!sessionStorage.getItem("spark-auth"));
      const [patients, setPatients] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [view, setView] = useState("search");
      const [doctors, setDoctors] = useState(null);
      const [locations, setLocations] = useState(null);
      const [clinicalTypes, setClinicalTypes] = useState(null);
      const [adminTypes, setAdminTypes] = useState(null);
      const [bvTests, setBvTests] = useState(null);
      const [selectedId, setSelectedId] = useState(null);
      const [searchQ, setSearchQ] = useState("");
      const [filters, setFilters] = useState({ location: "", therapy: "", status: "", doctor: "" });
      const [activeTab, setActiveTab] = useState("overview");
      const [showNewPatient, setShowNewPatient] = useState(false);
      const [undoStack, setUndoStack] = useState([]);

      useEffect(() => {
        const init = () => {
          Promise.all([
            loadPatients(),
            loadSetting("spark-doctors"),
            loadSetting("spark-locations"),
            loadSetting("spark-clinical-types"),
            loadSetting("spark-admin-types"),
            loadSetting("spark-bv-tests"),
          ]).then(([pts, docVal, locVal, clinVal, admVal, bvVal]) => {
            setPatients(pts || DEMO_PATIENTS);
            setDoctors(docVal ? JSON.parse(docVal) : [...DOCTORS]);
            setLocations(locVal ? JSON.parse(locVal) : [...LOCATIONS]);
            setClinicalTypes(clinVal ? JSON.parse(clinVal) : [...DEFAULT_CLINICAL_TYPES]);
            setAdminTypes(admVal ? JSON.parse(admVal) : [...DEFAULT_ADMIN_TYPES]);
            setBvTests(bvVal ? JSON.parse(bvVal) : [...DEFAULT_BV_TESTS]);
            setLoaded(true);
            document.getElementById("loading").style.display = "none";
          });
        };
        if (window.__firebaseReady) init();
        else window.addEventListener("firebaseReady", init);
      }, []);

      const save = useCallback((pts) => { setPatients(pts); savePatients(pts); }, []);
      const updatePatient = useCallback((updated) => { save(patients.map(p => p.id === updated.id ? updated : p)); }, [patients, save]);
      const pushUndo = (action) => setUndoStack(s => [...s.slice(-9), action]);
      const selectedPatient = patients.find(p => p.id === selectedId);

      if (!authed) return <PasswordGate onUnlock={() => setAuthed(true)} />;
      if (!loaded) return null;

      const alerts = getAlerts(patients);

      // Recent patients: sorted by last activity date, top 20
      const recentPatients = [...patients]
        .filter(p => !p.archived && getLastActivityDate(p))
        .sort((a,b) => getLastActivityDate(b).localeCompare(getLastActivityDate(a)))
        .slice(0, 20);

      const filteredPatients = patients.filter(p => {
        if (p.archived) return false;
        const q = searchQ.toLowerCase();
        if (q && !p.name.toLowerCase().includes(q)) return false;
        if (filters.location && p.location !== filters.location) return false;
        if (filters.therapy && p.therapy !== filters.therapy) return false;
        if (filters.status && p.status !== filters.status) return false;
        if (filters.doctor && p.initiatingDoctor !== filters.doctor && p.managingDoctor !== filters.doctor) return false;
        return true;
      });

      const handleSaveSettings = async ({ doctors: d, locations: l, clinicalTypes: c, adminTypes: a, bvTests: b }) => {
        setDoctors(d); setLocations(l); setClinicalTypes(c); setAdminTypes(a); setBvTests(b);
        await Promise.all([
          saveSetting("spark-doctors", JSON.stringify(d)),
          saveSetting("spark-locations", JSON.stringify(l)),
          saveSetting("spark-clinical-types", JSON.stringify(c)),
          saveSetting("spark-admin-types", JSON.stringify(a)),
          saveSetting("spark-bv-tests", JSON.stringify(b)),
        ]);
      };

      return (
        <div style={{ fontFamily: "'DM Sans', sans-serif", background: "#f0f4f8", minHeight: "100vh", color: "#1e293b" }}>
          <div style={{ background: "#0f4c75", color: "#fff", padding: "14px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", boxShadow: "0 2px 8px rgba(0,0,0,0.15)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ background: "#1e90b8", borderRadius: 10, width: 36, height: 36, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>👁</div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 16, letterSpacing: 0.3 }}>The Spark Optometry</div>
                <div style={{ fontSize: 11, opacity: 0.75, letterSpacing: 1 }}>MYOPIA MANAGEMENT TRACKER</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <NavBtn active={view === "search" || view === "patient"} onClick={() => { setView("search"); setSelectedId(null); }}>🔍 Search</NavBtn>
              <NavBtn active={view === "list"} onClick={() => setView("list")}>📋 All Patients</NavBtn>
              <NavBtn active={view === "settings"} onClick={() => setView("settings")}>⚙️ Settings</NavBtn>
              <button onClick={() => setShowNewPatient(true)} style={{ background: "#22c55e", color: "#fff", border: "none", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ New Patient</button>
            </div>
          </div>

          {showNewPatient && <NewPatientModal onClose={() => setShowNewPatient(false)} doctors={doctors||DOCTORS} locations={locations||LOCATIONS}
            onSave={(p) => {
              const np = { ...p, id: uid(), alMeasurements: [], refractions: [], lensHistory: [], clinicalEvents: [], adminEvents: [], bvEntries: [], dismissedAlerts: [], warrantyOrderDate: null };
              save([...patients, np]); setShowNewPatient(false); setSelectedId(np.id); setView("patient"); setActiveTab("overview");
            }} />}

          {view === "list" && <PatientListView patients={filteredPatients} filters={filters} setFilters={setFilters} onSelect={(id) => { setSelectedId(id); setView("patient"); setActiveTab("overview"); }} searchQ={searchQ} setSearchQ={setSearchQ} allLocations={locations||LOCATIONS} allDoctors={doctors||DOCTORS} />}

          {(view === "search" || (view === "patient" && !selectedId)) && (
            <SearchView alerts={alerts} searchQ={searchQ} setSearchQ={setSearchQ} results={filteredPatients}
              onSelect={(id) => { setSelectedId(id); setView("patient"); setActiveTab("overview"); }}
              onDismissAlert={(alertId, patientId) => { const p = patients.find(x => x.id === patientId); if (!p) return; updatePatient({ ...p, dismissedAlerts: [...(p.dismissedAlerts||[]), alertId] }); }}
              recentPatients={recentPatients}
            />
          )}

          {view === "settings" && <SettingsView doctors={doctors||DOCTORS} locations={locations||LOCATIONS} clinicalTypes={clinicalTypes||DEFAULT_CLINICAL_TYPES} adminTypes={adminTypes||DEFAULT_ADMIN_TYPES} bvTests={bvTests||DEFAULT_BV_TESTS} onSave={handleSaveSettings} patients={patients} onRestore={(id) => { const p = patients.find(x => x.id === id); if(p) updatePatient({...p, archived: false}); }} />}

          {view === "patient" && selectedId && selectedPatient && (
            <PatientView patient={selectedPatient} activeTab={activeTab} setActiveTab={setActiveTab}
              onBack={() => { setView("search"); setSelectedId(null); }}
              onUpdate={updatePatient}
              onArchive={(id) => { const p = patients.find(x => x.id === id); if(p) { updatePatient({...p, archived: true}); setView("search"); setSelectedId(null); } }}
              pushUndo={pushUndo} undoStack={undoStack} setUndoStack={setUndoStack}
              doctors={doctors||DOCTORS} locations={locations||LOCATIONS}
              clinicalTypes={clinicalTypes||DEFAULT_CLINICAL_TYPES}
              adminTypes={adminTypes||DEFAULT_ADMIN_TYPES}
              bvTests={bvTests||DEFAULT_BV_TESTS}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MyopiaTracker />);
  </script>
</body>
</html>
