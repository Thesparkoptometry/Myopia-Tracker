    function TypeListEditor({ title, icon, items, onChange, placeholder }) {
      const [newItem, setNewItem] = useState("");
      const move = (i, dir) => { const arr = [...items]; const j = i + dir; if (j < 0 || j >= arr.length) return; [arr[i], arr[j]] = [arr[j], arr[i]]; onChange(arr); };
      return (
        <div style={{ background: "#fff", borderRadius: 12, boxShadow: "0 2px 12px rgba(0,0,0,0.07)", padding: "20px 24px", marginBottom: 20 }}>
          <div style={{ fontWeight: 700, fontSize: 15, color: "#0f4c75", marginBottom: 14 }}>{icon} {title}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 12 }}>
            {items.map((item, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, background: "#f8fafc", borderRadius: 8, padding: "6px 10px", border: "1px solid #e2e8f0" }}>
                <span style={{ flex: 1, fontSize: 13 }}>{item}</span>
                <button onClick={() => move(i, -1)} disabled={i === 0} style={{ background: "none", border: "1px solid #e2e8f0", borderRadius: 4, padding: "2px 6px", cursor: "pointer", color: "#64748b", fontSize: 12 }}>↑</button>
                <button onClick={() => move(i, 1)} disabled={i === items.length-1} style={{ background: "none", border: "1px solid #e2e8f0", borderRadius: 4, padding: "2px 6px", cursor: "pointer", color: "#64748b", fontSize: 12 }}>↓</button>
                <button onClick={() => onChange(items.filter((_,j) => j !== i))} style={{ background: "#fce7f3", border: "none", borderRadius: 5, padding: "3px 8px", cursor: "pointer", color: "#db2777", fontSize: 12 }}>✕</button>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <input value={newItem} onChange={e => setNewItem(e.target.value)} placeholder={placeholder} style={{ ...inputStyle, flex: 1 }} onKeyDown={e => { if (e.key === "Enter" && newItem.trim()) { onChange([...items, newItem.trim()]); setNewItem(""); }}} />
            <button onClick={() => { if (newItem.trim()) { onChange([...items, newItem.trim()]); setNewItem(""); }}} style={btnStyle("#0f4c75")}>Add</button>
          </div>
        </div>
      );
    }

                <span style={{ flex: 1, fontSize: 12 }}>{item}</span>
                <button onClick={() => { const a=[...items];[a[i],a[i-1]]=[a[i-1],a[i]];if(i>0)onChange(a);}} disabled={i===0} style={{ background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:11,padding:"0 2px" }}>↑</button>
                <button onClick={() => { const a=[...items];[a[i],a[i+1]]=[a[i+1],a[i]];if(i<items.length-1)onChange(a);}} disabled={i===items.length-1} style={{ background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:11,padding:"0 2px" }}>↓</button>
                <button onClick={() => onChange(items.filter((_,j) => j !== i))} style={{ background:"none",border:"none",cursor:"pointer",color:"#fca5a5",fontSize:12,padding:"0 2px" }}>✕</button>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <input value={newItem} onChange={e => setNewItem(e.target.value)} placeholder={placeholder} style={{ ...inputStyle, flex: 1, fontSize: 12 }}
              onKeyDown={e => { if (e.key === "Enter" && newItem.trim()) { onChange([...items, newItem.trim()]); setNewItem(""); }}} />
            <button onClick={() => { if (newItem.trim()) { onChange([...items, newItem.trim()]); setNewItem(""); }}} style={btnStyle("#0f4c75", true)}>{addLabel||"Add"}</button>
          </div>
        </div>
      );
    }

    function SettingsView({ doctors, locations, clinicalTypes, adminTypes, bvTests, onSave, patients, onRestore }) {
      const [docList, setDocList] = useState([...doctors]);
      const [locList, setLocList] = useState([...locations]);
      const [clinList, setClinList] = useState([...(clinicalTypes||DEFAULT_CLINICAL_TYPES)]);
      const [admList, setAdmList] = useState([...(adminTypes||DEFAULT_ADMIN_TYPES)]);
      const [bvList, setBvList] = useState([...(bvTests||DEFAULT_BV_TESTS)]);
      const [saved, setSaved] = useState(false);
      const save = async () => {
        await onSave({ doctors: docList, locations: locList, clinicalTypes: clinList, adminTypes: admList, bvTests: bvList });
        setSaved(true); setTimeout(() => setSaved(false), 2000);
      };
      const archived = patients ? patients.filter(p => p.archived) : [];
      return (
        <div style={{ maxWidth: 1000, margin: "0 auto", padding: "20px 16px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
            <div>
              <div style={{ fontWeight: 700, fontSize: 18, color: "#0f4c75" }}>⚙️ Settings</div>
              <div style={{ fontSize: 12, color: "#64748b" }}>Manage event types, doctors, and locations</div>
            </div>
            <button onClick={save} style={{ ...btnStyle("#22c55e"), fontSize: 13, padding: "8px 24px" }}>{saved ? "✓ Saved!" : "Save All Changes"}</button>
          </div>

          {/* Top row: clinical types + admin types */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
            <CompactListPanel title="Clinical Event Types" icon="🩺" items={clinList} onChange={setClinList} placeholder="New clinical type…" />
            <CompactListPanel title="Admin Event Types" icon="📋" items={admList} onChange={setAdmList} placeholder="New admin type…" />
          </div>

          {/* Second row: doctors + BV tests */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
            <CompactListPanel title="Doctors" icon="👨‍⚕️" items={docList} onChange={setDocList} placeholder="Dr. Name…" />
            <CompactListPanel title="BV Tests" icon="👁" items={bvList} onChange={setBvList} placeholder="New BV test…" />
          </div>

          {/* Third row: locations (half width) + archived */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
            <CompactListPanel title="Locations" icon="📍" items={locList} onChange={setLocList} placeholder="Location name…" />
            {archived.length > 0 && (
              <div style={{ background: "#fff", borderRadius: 10, border: "1px solid #e2e8f0", padding: "12px 14px" }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: "#64748b", marginBottom: 8 }}>🗄 Archived ({archived.length})</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {archived.map(p => (
                    <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 6px", borderRadius: 5, background: "#f8fafc", border: "1px solid #f1f5f9" }}>
                      <span style={{ flex: 1, fontSize: 12, color: "#64748b" }}>{p.name}</span>
                      <span style={{ fontSize: 10, color: "#94a3b8" }}>{p.therapy}</span>
                      <button onClick={() => onRestore(p.id)} style={{ background: "#d1fae5", border: "none", borderRadius: 4, padding: "2px 8px", cursor: "pointer", color: "#065f46", fontSize: 11, fontWeight: 600 }}>Restore</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          <div style={{ textAlign: "right" }}>
            <button onClick={save} style={{ ...btnStyle("#22c55e"), fontSize: 13, padding: "8px 24px" }}>{saved ? "✓ Saved!" : "Save All Changes"}</button>
          </div>
        </div>
      );
    }

    const APP_PASSWORD = "Target123";
    function PasswordGate({ onUnlock }) {
      const [input, setInput] = useState(""); const [error, setError] = useState(false);
      const submit = () => {
        if (input === APP_PASSWORD) { sessionStorage.setItem("spark-auth", "1"); onUnlock(); }
        else { setError(true); setInput(""); setTimeout(() => setError(false), 2000); }
      };
      return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#f0f4f8" }}>
          <div style={{ background: "#fff", borderRadius: 16, padding: "40px 36px", boxShadow: "0 8px 40px rgba(0,0,0,0.12)", maxWidth: 360, width: "100%", textAlign: "center" }}>
            <div style={{ background: "#1e90b8", borderRadius: 12, width: 52, height: 52, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, margin: "0 auto 16px" }}>👁</div>
            <div style={{ fontWeight: 700, fontSize: 18, color: "#0f4c75", marginBottom: 4 }}>The Spark Optometry</div>
            <div style={{ fontSize: 12, color: "#94a3b8", letterSpacing: 1, marginBottom: 28 }}>MYOPIA MANAGEMENT TRACKER</div>
            <input type="password" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()} placeholder="Enter password" autoFocus
              style={{ width: "100%", padding: "11px 14px", fontSize: 15, border: `2px solid ${error ? "#dc2626" : "#e2e8f0"}`, borderRadius: 8, outline: "none", fontFamily: "'DM Sans', sans-serif", boxSizing: "border-box", marginBottom: 12, textAlign: "center", letterSpacing: 2 }} />
            {error && <div style={{ color: "#dc2626", fontSize: 13, marginBottom: 10 }}>Incorrect password</div>}
            <button onClick={submit} style={{ ...btnStyle("#0f4c75"), width: "100%", padding: "11px", fontSize: 14 }}>Sign In</button>
          </div>
        </div>
      );
    }

    function MyopiaTracker() {
      const [authed, setAuthed] = useState(!!sessionStorage.getItem("spark-auth"));
      const [patients, setPatients] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [view, setView] = useState("home");
      const [doctors, setDoctors] = useState(null);
      const [locations, setLocations] = useState(null);
      const [clinicalTypes, setClinicalTypes] = useState(null);
      const [adminTypes, setAdminTypes] = useState(null);
      const [bvTests, setBvTests] = useState(null);
      const [queueIds, setQueueIds] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [searchQ, setSearchQ] = useState("");
      const [activeTab, setActiveTab] = useState("overview");
      const [showNewPatient, setShowNewPatient] = useState(false);
      const [undoStack, setUndoStack] = useState([]);

      useEffect(() => {
        const init = () => {
          Promise.all([
            loadPatients(),
            loadSetting("spark-doctors"),
            loadSetting("spark-locations"),
            loadSetting("spark-clinical-types"),
            loadSetting("spark-admin-types"),
            loadSetting("spark-bv-tests"),
            loadSetting("spark-queue"),
          ]).then(([pts, docVal, locVal, clinVal, admVal, bvVal, queueVal]) => {
            setPatients(pts || DEMO_PATIENTS);
            setDoctors(docVal ? JSON.parse(docVal) : [...DOCTORS]);
            setLocations(locVal ? JSON.parse(locVal) : [...LOCATIONS]);
            setClinicalTypes(clinVal ? JSON.parse(clinVal) : [...DEFAULT_CLINICAL_TYPES]);
            setAdminTypes(admVal ? JSON.parse(admVal) : [...DEFAULT_ADMIN_TYPES]);
            setBvTests(bvVal ? JSON.parse(bvVal) : [...DEFAULT_BV_TESTS]);
            setQueueIds(queueVal ? JSON.parse(queueVal) : []);
            setLoaded(true);
            document.getElementById("loading").style.display = "none";
          });
        };
        if (window.__firebaseReady) init();
        else window.addEventListener("firebaseReady", init);
      }, []);

      const save = useCallback((pts) => { setPatients(pts); savePatients(pts); }, []);
      const updatePatient = useCallback((updated) => { save(patients.map(p => p.id === updated.id ? updated : p)); }, [patients, save]);
      const pushUndo = (action) => setUndoStack(s => [...s.slice(-9), action]);
      const selectedPatient = patients.find(p => p.id === selectedId);

      const updateQueue = (ids) => { setQueueIds(ids); saveSetting("spark-queue", JSON.stringify(ids)); };
      const addToQueue = (id) => { if (!queueIds.includes(id)) updateQueue([...queueIds, id]); };
      const removeFromQueue = (id) => updateQueue(queueIds.filter(x => x !== id));
      const clearQueue = () => updateQueue([]);

      if (!authed) return <PasswordGate onUnlock={() => setAuthed(true)} />;
      if (!loaded) return null;

      const alerts = getAlerts(patients);
      const activePts = patients.filter(p => !p.archived);

      const handleSaveSettings = async ({ doctors: d, locations: l, clinicalTypes: c, adminTypes: a, bvTests: b }) => {
        setDoctors(d); setLocations(l); setClinicalTypes(c); setAdminTypes(a); setBvTests(b);
        await Promise.all([
          saveSetting("spark-doctors", JSON.stringify(d)),
          saveSetting("spark-locations", JSON.stringify(l)),
          saveSetting("spark-clinical-types", JSON.stringify(c)),
          saveSetting("spark-admin-types", JSON.stringify(a)),
          saveSetting("spark-bv-tests", JSON.stringify(b)),
        ]);
      };

      return (
        <div style={{ fontFamily: "'DM Sans', sans-serif", background: "#f0f4f8", minHeight: "100vh", color: "#1e293b" }}>
          <div style={{ background: "#0f4c75", color: "#fff", padding: "12px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", boxShadow: "0 2px 8px rgba(0,0,0,0.15)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ background: "#1e90b8", borderRadius: 10, width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17 }}>👁</div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, letterSpacing: 0.3 }}>The Spark Optometry</div>
                <div style={{ fontSize: 10, opacity: 0.75, letterSpacing: 1 }}>MYOPIA MANAGEMENT TRACKER</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <NavBtn active={view === "home" || view === "patient"} onClick={() => { setView("home"); setSelectedId(null); }}>🏠 Home</NavBtn>
              <NavBtn active={view === "settings"} onClick={() => setView("settings")}>⚙️ Settings</NavBtn>
              <button onClick={() => setShowNewPatient(true)} style={{ background: "#22c55e", color: "#fff", border: "none", borderRadius: 6, padding: "6px 14px", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ New Patient</button>
            </div>
          </div>

          {showNewPatient && <NewPatientModal onClose={() => setShowNewPatient(false)} doctors={doctors||DOCTORS} locations={locations||LOCATIONS}
            onSave={(p) => {
              const np = { ...p, id: uid(), alMeasurements: [], refractions: [], lensHistory: [], clinicalEvents: [], adminEvents: [], bvEntries: [], dismissedAlerts: [], warrantyOrderDate: null };
              save([...patients, np]); setShowNewPatient(false); setSelectedId(np.id); setView("patient"); setActiveTab("overview");
            }} />}

          {view === "home" && (
            <HomeView alerts={alerts} searchQ={searchQ} setSearchQ={setSearchQ} patients={activePts}
              onSelect={(id) => { setSelectedId(id); setView("patient"); setActiveTab("overview"); setSearchQ(""); }}
              onDismissAlert={(alertId, patientId) => { const p = patients.find(x => x.id === patientId); if (!p) return; updatePatient({ ...p, dismissedAlerts: [...(p.dismissedAlerts||[]), alertId] }); }}
              queueIds={queueIds} onAddToQueue={addToQueue} onRemoveFromQueue={removeFromQueue} onClearQueue={clearQueue}
            />
          )}

          {view === "settings" && <SettingsView doctors={doctors||DOCTORS} locations={locations||LOCATIONS} clinicalTypes={clinicalTypes||DEFAULT_CLINICAL_TYPES} adminTypes={adminTypes||DEFAULT_ADMIN_TYPES} bvTests={bvTests||DEFAULT_BV_TESTS} onSave={handleSaveSettings} patients={patients} onRestore={(id) => { const p = patients.find(x => x.id === id); if(p) updatePatient({...p, archived: false}); }} />}

          {view === "patient" && selectedId && selectedPatient && (
            <PatientView patient={selectedPatient} activeTab={activeTab} setActiveTab={setActiveTab}
              onBack={() => { setView("home"); setSelectedId(null); }}
              onUpdate={updatePatient}
              onArchive={(id) => { const p = patients.find(x => x.id === id); if(p) { updatePatient({...p, archived: true}); setView("home"); setSelectedId(null); } }}
              pushUndo={pushUndo} undoStack={undoStack} setUndoStack={setUndoStack}
              doctors={doctors||DOCTORS} locations={locations||LOCATIONS}
              clinicalTypes={clinicalTypes||DEFAULT_CLINICAL_TYPES}
              adminTypes={adminTypes||DEFAULT_ADMIN_TYPES}
              bvTests={bvTests||DEFAULT_BV_TESTS}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MyopiaTracker />);
  </script>
</body>
</html>
