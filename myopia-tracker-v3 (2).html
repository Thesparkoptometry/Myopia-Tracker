    function fmtDate(d) {
      if (!d) return "";
      const dt = new Date(d + "T00:00:00");
      return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

    function parseDate(s) { return s ? new Date(s + "T00:00:00") : null; }
    function daysBetween(a, b) { return Math.round((b - a) / 86400000); }
    function durationLabel(a, b) {
      const totalDays = daysBetween(a, b);
      if (totalDays <= 0) return "0 d";
      const years = Math.floor(totalDays / 365.25);
      const remAfterYears = totalDays - Math.round(years * 365.25);
      const months = Math.floor(remAfterYears / 30.44);
      const remAfterMonths = Math.round(remAfterYears - months * 30.44);
      const weeks = Math.floor(remAfterMonths / 7);
      const days = remAfterMonths % 7;
      const parts = [];
      if (years > 0) parts.push(`${years} yr`);
      if (months > 0) parts.push(`${months} mo`);
      if (weeks > 0) parts.push(`${weeks} wk`);
      if (days > 0 && years === 0 && months === 0) parts.push(`${days} d`);
      return parts.join(" ") || "0 d";
    }
    function sgnFmt(n, decimals = 2) {
      if (n === null || n === undefined || isNaN(n)) return "-";
      return (n >= 0 ? "+" : "") + n.toFixed(decimals);
    }
    function displayName(fullName) {

    function ageLabel(dob) {
      if (!dob) return "";
      const birth = new Date(dob + "T00:00:00");
      const now = new Date();
      let years = now.getFullYear() - birth.getFullYear();
      let months = now.getMonth() - birth.getMonth();
      if (months < 0) { years--; months += 12; }
      const parts = [];
      if (years > 0) parts.push(`${years} yr`);
      if (months > 0) parts.push(`${months} mo`);
      return parts.join(" ") || "< 1 mo";
    }

    function getPatientWarrantyExpiry(p) {
      const entries = (p.lensHistory||[]).filter(l => l.warrantyStart);
      if (!entries.length) return null;
      const latest = entries.sort((a,b) => b.warrantyStart.localeCompare(a.warrantyStart))[0];
      const startDt = parseDate(latest.warrantyStart);
      const months = latest.warrantyMonths ? parseFloat(latest.warrantyMonths) : 4;
      return new Date(startDt.getTime() + months * 30.44 * 86400000);
    }

    function getWarrantyColor(daysLeft) {
      if (daysLeft < 0) return { bg: "#fff1f2", text: "#dc2626", border: "#fecaca" };
      if (daysLeft <= 14) return { bg: "#fff1f2", text: "#dc2626", border: "#fecaca" };
      if (daysLeft <= 30) return { bg: "#fef3c7", text: "#92400e", border: "#fcd34d" };
      return { bg: "#f1f5f9", text: "#475569", border: "#e2e8f0" };
    }

    function getAlerts(patients) {
      const now = new Date();
      const alerts = [];
      for (const p of patients) {
        if (!Array.isArray(p.dismissedAlerts)) p.dismissedAlerts = [];
        const expiryDt = getPatientWarrantyExpiry(p);
        if (expiryDt && usesLens(p)) {
          const daysLeft = daysBetween(now, expiryDt);
          const alertId = `warranty-${p.id}`;
          if (daysLeft <= 30 && !p.dismissedAlerts.includes(alertId)) {
            const isExpired = daysLeft < 0;
            const timeStr = durationLabel(isExpired ? expiryDt : now, isExpired ? now : expiryDt);
            alerts.push({ id: alertId, patientId: p.id, patientName: p.name, type: "warranty", label: isExpired ? `Lens warranty expired ${timeStr} ago` : `Lens warranty expires in ${timeStr}`, severity: daysLeft < 14 ? "high" : "medium" });
          }
        }
        const als = [...(p.alMeasurements || [])].sort((a, b) => a.date.localeCompare(b.date));
        if (als.length >= 2) {
          const last = als[als.length - 1], prev = als[als.length - 2];
          const days = daysBetween(parseDate(prev.date), parseDate(last.date));
          if (days > 0) {
            const annualized = ((parseFloat(last.od) - parseFloat(prev.od)) / days) * 365;
            const alertId = `al-prog-${p.id}`;
            if (annualized > 0.3 && !p.dismissedAlerts.includes(alertId))
              alerts.push({ id: alertId, patientId: p.id, patientName: p.name, type: "progression", label: `Progressing AL: ${sgnFmt(annualized)} mm/yr annualized (OD)`, severity: annualized > 0.5 ? "high" : "medium" });
          }
        }
      }
      return alerts;
    }

    function generateStory(patient) {
      const als = [...(patient.alMeasurements || [])].sort((a, b) => a.date.localeCompare(b.date));
      if (als.length < 2) return { narrative: "Not enough data to generate a clinical story.", tableRows: [], clinicalNotes: [], interpretation: "" };
      const latest = als[als.length - 1], baseline = als[0];
      const latestDt = parseDate(latest.date), baselineDt = parseDate(baseline.date);
      const totalDays = daysBetween(baselineDt, latestDt);
      const totalOD = parseFloat(latest.od) - parseFloat(baseline.od), totalOS = parseFloat(latest.os) - parseFloat(baseline.os);
      const annualOD = totalDays > 0 ? (totalOD / totalDays) * 365 : 0;
      const annualOS = totalDays > 0 ? (totalOS / totalDays) * 365 : 0;
      const prev = als[als.length - 2];
      const prevDt = parseDate(prev.date);
      const intervalOD = parseFloat(latest.od) - parseFloat(prev.od), intervalOS = parseFloat(latest.os) - parseFloat(prev.os);
      const intervalLabel = durationLabel(prevDt, latestDt);
      const targets = [{ label: "~3 mo", days: 91 }, { label: "~6 mo", days: 182 }, { label: "~12 mo", days: 365 }, { label: "Baseline", days: totalDays }];
      const tableRows = [];
      for (const t of targets) {
        const closest = als.slice(0, -1).reduce((best, m) => {
          const diff = Math.abs(daysBetween(parseDate(m.date), latestDt) - t.days);
          return diff < Math.abs(daysBetween(parseDate(best.date), latestDt) - t.days) ? m : best;
        }, als[0]);
        const closestDays = daysBetween(parseDate(closest.date), latestDt);
        if (Math.abs(closestDays - t.days) > t.days * 0.5) continue;
        tableRows.push({ label: t.label === "Baseline" ? "Baseline" : durationLabel(parseDate(closest.date), latestDt), date: closest.date, dOD: latest.od - closest.od, dOS: latest.os - closest.os });
      }
      const clinicalNotes = (patient.clinicalEvents || []).filter(e => { const ed = parseDate(e.date); return ed >= baselineDt && ed <= latestDt; }).map(e => `${fmtDate(e.date)}: ${e.type}${e.notes ? " — " + e.notes : ""}`);
      let interp = annualOD <= 0.10 ? "AL growth is minimal and may indicate near-stabilization."
        : annualOD <= 0.20 ? "AL growth is below the high-risk threshold. Current treatment appears to be providing good control."
        : annualOD <= 0.30 ? "AL growth is moderate. Consider whether intensification or combination therapy is warranted."
        : "AL growth exceeds 0.30 mm/yr. Evaluate treatment escalation or combination therapy.";
      const rxs = [...(patient.refractions || [])].sort((a, b) => a.date.localeCompare(b.date));
      const baselineRx = rxs[0], latestRx = rxs[rxs.length - 1];
      const fmtSph = (s) => s !== undefined ? `${Number(s) >= 0 ? "+" : ""}${Number(s).toFixed(2)}` : "–";
      let rxSentence = "";
      if (latestRx) {
        const lStr = `OD ${fmtSph(latestRx.odSph)}${latestRx.odCyl && latestRx.odCyl !== 0 ? ` ${fmtSph(latestRx.odCyl)} ×${latestRx.odAxis}°` : " sph"} / OS ${fmtSph(latestRx.osSph)}${latestRx.osCyl && latestRx.osCyl !== 0 ? ` ${fmtSph(latestRx.osCyl)} ×${latestRx.osAxis}°` : " sph"}`;
        if (baselineRx && baselineRx.date !== latestRx.date) {
          const bStr = `OD ${fmtSph(baselineRx.odSph)} / OS ${fmtSph(baselineRx.osSph)}`;
          rxSentence = ` Refractive error progressed from ${bStr} at baseline to ${lStr}, a change of ${fmtSph(Number(latestRx.odSph) - Number(baselineRx.odSph))} D OD and ${fmtSph(Number(latestRx.osSph) - Number(baselineRx.osSph))} D OS.`;
        } else { rxSentence = ` Current refractive error is ${lStr}.`; }
      }
      const narrative = `${displayName(patient.name)} has been followed from baseline on ${fmtDate(baseline.date)} through ${fmtDate(latest.date)} — ${durationLabel(baselineDt, latestDt)}. Total axial length growth: ${sgnFmt(totalOD)} mm OD and ${sgnFmt(totalOS)} mm OS, yielding ${sgnFmt(annualOD)} mm/yr OD and ${sgnFmt(annualOS)} mm/yr OS. The most recent interval (${intervalLabel}) showed ${sgnFmt(intervalOD)} mm OD and ${sgnFmt(intervalOS)} mm OS.${rxSentence}`;
      return { narrative, tableRows, clinicalNotes, interpretation: interp, annualOD, annualOS, baseline, latest };
    }

    const th = { textAlign: "left", padding: "6px 8px", fontWeight: 700, fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.4, background: "#f1f5f9", border: "1px solid #e2e8f0" };

    function ALGraph({ patient }) {
      const canvasRef = useRef(null);
      const [tooltip, setTooltip] = useState(null);
      const pointsRef = useRef([]);
      const drawGraph = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const als = [...(patient.alMeasurements || [])].sort((a, b) => a.date.localeCompare(b.date));
        if (als.length < 2) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
        const W = canvas.width, H = canvas.height;
        const PAD = { top: 40, right: 40, bottom: 55, left: 62 };
        ctx.clearRect(0, 0, W, H);
        const allVals = als.flatMap(m => [m.od, m.os]);
        const minV = Math.min(...allVals) - 0.15, maxV = Math.max(...allVals) + 0.15;
        const dates = als.map(m => parseDate(m.date).getTime());
        const minD = Math.min(...dates), maxD = Math.max(...dates);
        const toX = d => PAD.left + ((d - minD) / (maxD - minD || 1)) * (W - PAD.left - PAD.right);
        const toY = v => H - PAD.bottom - ((v - minV) / (maxV - minV || 1)) * (H - PAD.top - PAD.bottom);
        ctx.strokeStyle = "#e2e8f0"; ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
          const v = minV + (maxV - minV) * (i / 4), y = toY(v);
          ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
          ctx.fillStyle = "#94a3b8"; ctx.font = "10px sans-serif"; ctx.textAlign = "right";
          ctx.fillText(v.toFixed(2), PAD.left - 5, y + 4);
        }
        if (patient.therapyStartDate) {
          const startTs = parseDate(patient.therapyStartDate).getTime();
          if (startTs >= minD && startTs <= maxD) {
            const x = toX(startTs);
            ctx.strokeStyle = "#22c55e"; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
            ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, H - PAD.bottom); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = "#22c55e"; ctx.font = "9px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("Tx start", x, PAD.top - 5);
          }
        }
        (patient.clinicalEvents || []).filter(e => e.type === "Treatment Change").map(e => parseDate(e.date).getTime()).filter(t => t >= minD && t <= maxD).forEach(t => {
          const x = toX(t);
          ctx.strokeStyle = "#fbbf24"; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
          ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, H - PAD.bottom); ctx.stroke();
          ctx.setLineDash([]);
        });
        (patient.refractions || []).map(e => parseDate(e.date).getTime()).filter(t => t >= minD && t <= maxD).forEach(t => {
          const x = toX(t);
          ctx.strokeStyle = "#a78bfa"; ctx.lineWidth = 1; ctx.setLineDash([2, 4]);
          ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, H - PAD.bottom); ctx.stroke();
          ctx.setLineDash([]);
        });
        ctx.strokeStyle = "#0f4c75"; ctx.lineWidth = 2.5; ctx.beginPath();
        als.forEach((m, i) => { const x = toX(parseDate(m.date).getTime()), y = toY(m.od); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.stroke();
        als.forEach(m => { const x = toX(parseDate(m.date).getTime()), y = toY(m.od); ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fillStyle = "#0f4c75"; ctx.fill(); ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.stroke(); });
        ctx.strokeStyle = "#3b82f6"; ctx.lineWidth = 2.5; ctx.beginPath();
        als.forEach((m, i) => { const x = toX(parseDate(m.date).getTime()), y = toY(m.os); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }); ctx.stroke();
        als.forEach(m => { const x = toX(parseDate(m.date).getTime()), y = toY(m.os); ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fillStyle = "#3b82f6"; ctx.fill(); ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.stroke(); });
        ctx.fillStyle = "#64748b"; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
        als.forEach(m => { ctx.fillText(m.date.slice(0, 7), toX(parseDate(m.date).getTime()), H - PAD.bottom + 16); });
        const legY = H - 14;
        [[PAD.left, "#0f4c75", "OD"], [PAD.left + 50, "#3b82f6", "OS"], [PAD.left + 100, "#fbbf24", "Tx Change"], [PAD.left + 185, "#a78bfa", "Rx visit"], [PAD.left + 250, "#22c55e", "Tx start"]].forEach(([x, col, label]) => {
          ctx.fillStyle = col; ctx.fillRect(x, legY - 4, 14, 4);
          ctx.fillStyle = "#374151"; ctx.font = "10px sans-serif"; ctx.textAlign = "left"; ctx.fillText(label, x + 18, legY);
        });
        const rxMap = {};
        (patient.refractions || []).forEach(r => { rxMap[r.date] = r; });
        pointsRef.current = als.map(m => ({ date: m.date, od: m.od, os: m.os, xOD: toX(parseDate(m.date).getTime()), yOD: toY(m.od), yOS: toY(m.os), rx: rxMap[m.date] || null }));
      }, [patient]);
      useEffect(() => { const t = setTimeout(() => drawGraph(), 60); return () => clearTimeout(t); }, [drawGraph]);
      useEffect(() => { const onResize = () => drawGraph(); window.addEventListener("resize", onResize); return () => window.removeEventListener("resize", onResize); }, [drawGraph]);
      const handleMouseMove = (e) => {
        const canvas = canvasRef.current; if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);
        let found = null;
        for (const pt of pointsRef.current) {
          if (Math.hypot(mx - pt.xOD, my - pt.yOD) < 12 || Math.hypot(mx - pt.xOD, my - pt.yOS) < 12) {
            found = { date: pt.date, od: pt.od, os: pt.os, rx: pt.rx, x: e.clientX - rect.left, y: e.clientY - rect.top }; break;
          }
        }
        setTooltip(found);
      };
      return (
        <div style={{ position: "relative" }}>
          <canvas ref={canvasRef} width={700} height={300}
            style={{ width: "100%", height: "auto", borderRadius: 8, background: "#f8fafc", cursor: "crosshair", display: "block" }}
            onMouseMove={handleMouseMove} onMouseLeave={() => setTooltip(null)} />
          {tooltip && (
            <div style={{ position: "absolute", left: tooltip.x + 12, top: tooltip.y - 10, background: "#1e293b", color: "#fff", borderRadius: 8, padding: "8px 12px", fontSize: 12, pointerEvents: "none", zIndex: 10, whiteSpace: "nowrap", boxShadow: "0 4px 12px rgba(0,0,0,0.3)" }}>
              <div style={{ fontWeight: 700, marginBottom: 4 }}>{fmtDate(tooltip.date)}</div>
              <div style={{ color: "#fca5a5" }}>OD: {tooltip.od} mm</div>
              <div style={{ color: "#93c5fd" }}>OS: {tooltip.os} mm</div>
              {tooltip.rx && (
                <div style={{ marginTop: 6, paddingTop: 6, borderTop: "1px solid rgba(255,255,255,0.15)" }}>
                  <div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 2 }}>Refraction</div>
                  <div style={{ color: "#fca5a5" }}>OD {tooltip.rx.odSph >= 0 ? "+" : ""}{Number(tooltip.rx.odSph).toFixed(2)} {tooltip.rx.odCyl !== 0 ? `${tooltip.rx.odCyl >= 0 ? "+" : ""}${Number(tooltip.rx.odCyl).toFixed(2)} ×${tooltip.rx.odAxis}°` : "sph"}</div>
                  <div style={{ color: "#93c5fd" }}>OS {tooltip.rx.osSph >= 0 ? "+" : ""}{Number(tooltip.rx.osSph).toFixed(2)} {tooltip.rx.osCyl !== 0 ? `${tooltip.rx.osCyl >= 0 ? "+" : ""}${Number(tooltip.rx.osCyl).toFixed(2)} ×${tooltip.rx.osAxis}°` : "sph"}</div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

                  </span>
                  <span style={{ fontSize: 11, color: p.status === "Active" ? "#16a34a" : "#94a3b8", whiteSpace: "nowrap" }}>{p.status}</span>
                  <span style={{ fontSize: 11, color: "#64748b", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.managingDoctor || p.initiatingDoctor}</span>
                  <span style={{ fontSize: 11, color: "#64748b", whiteSpace: "nowrap" }}>{fmtDate(getLastActivityDate(p)) || "—"}</span>
                  <button onClick={() => inQueue ? onRemoveFromQueue(p.id) : onAddToQueue(p.id)}
                    style={{ background: inQueue ? "#dbeafe" : "#f1f5f9", color: inQueue ? "#1d4ed8" : "#94a3b8", border: "none", borderRadius: 5, padding: "3px 6px", cursor: "pointer", fontSize: 12, fontWeight: inQueue ? 700 : 400 }}>
                    {inQueue ? "✓" : "+"}
                  </button>
                </div>
              );
            })}
            {sorted.length === 0 && <div style={{ padding: 20, textAlign: "center", color: "#94a3b8", fontSize: 13 }}>No patients match your filters.</div>}
            {sorted.length > 60 && <div style={{ padding: "8px 12px", textAlign: "center", color: "#94a3b8", fontSize: 12 }}>Showing 60 of {sorted.length} — use search to narrow</div>}
          </div>
        </div>
      );
    }

    // ── Today quick-add panel ──────────────────────────────────────────────────
    function TodayPanel({ patient, onUpdate, clinicalTypes, adminTypes, onClose }) {
      const emptyAL   = () => ({ date: today(), od: "", os: "", notes: "" });
      const emptyRx   = () => ({ date: today(), odSph: "", odCyl: "", odAxis: "", odVA: "20/20", osSph: "", osCyl: "", osAxis: "", osVA: "20/20" });
      const emptyClin = () => ({ date: today(), type: (clinicalTypes||DEFAULT_CLINICAL_TYPES)[0], notes: "" });
      const emptyAdm  = () => ({ date: today(), type: (adminTypes||DEFAULT_ADMIN_TYPES)[0], notes: "" });

      const [alForm, setAlForm] = useState(emptyAL());
      const [rxForm, setRxForm] = useState(emptyRx());
      const [clinForm, setClinForm] = useState(emptyClin());
      const [admForm, setAdmForm] = useState(emptyAdm());
      const [flash, setFlash] = useState({});
      const doFlash = k => { setFlash(f => ({...f, [k]: true})); setTimeout(() => setFlash(f => ({...f, [k]: false})), 1800); };

      const [alSaved, setAlSaved] = useState(false);
      const [rxSaved, setRxSaved] = useState(false);
      const [clinSaved, setClinSaved] = useState(false);
      const [admSaved, setAdmSaved] = useState(false);

      // track pending (unsaved) state for save-all
      const pendingRef = useRef({ al: false, rx: false, clin: false, adm: false });

      const saveAL = (p) => {
        const pt = p || patient;
        if (!alForm.date || !alForm.od || !alForm.os) return pt;
        const updated = { ...pt, alMeasurements: [...(pt.alMeasurements||[]), { id: uid(), ...alForm, od: parseFloat(alForm.od), os: parseFloat(alForm.os) }] };
        onUpdate(updated); setAlForm(emptyAL()); doFlash("al"); setAlSaved(true);
        pendingRef.current.al = false;
        return updated;
      };
      const saveRx = (p) => {
        const pt = p || patient;
        if (!rxForm.date || !rxForm.odSph || !rxForm.osSph) return pt;
        const updated = { ...pt, refractions: [...(pt.refractions||[]), { id: uid(), ...rxForm, odSph: parseFloat(rxForm.odSph), odCyl: parseFloat(rxForm.odCyl||0), odAxis: parseInt(rxForm.odAxis||0), osSph: parseFloat(rxForm.osSph), osCyl: parseFloat(rxForm.osCyl||0), osAxis: parseInt(rxForm.osAxis||0) }] };
        onUpdate(updated); setRxForm(emptyRx()); doFlash("rx"); setRxSaved(true);
        pendingRef.current.rx = false;
        return updated;
      };
      const saveClin = (p) => {
        const pt = p || patient;
        if (!clinForm.date || !clinForm.type) return pt;
        const updated = { ...pt, clinicalEvents: [...(pt.clinicalEvents||[]), { id: uid(), ...clinForm }] };
        onUpdate(updated); setClinForm(emptyClin()); doFlash("clin"); setClinSaved(true);
        pendingRef.current.clin = false;
        return updated;
      };
      const saveAdm = (p) => {
        const pt = p || patient;
        if (!admForm.date || !admForm.type) return pt;
        const updated = { ...pt, adminEvents: [...(pt.adminEvents||[]), { id: uid(), ...admForm }] };
        onUpdate(updated); setAdmForm(emptyAdm()); doFlash("adm"); setAdmSaved(true);
        pendingRef.current.adm = false;
        return updated;
      };
      const saveAll = () => {
        // chain saves so each builds on the last
        let p = patient;
        if (alForm.od && alForm.os) p = saveAL(p);
        if (rxForm.odSph && rxForm.osSph) p = saveRx(p);
        if (clinForm.notes || clinForm.type) p = saveClin(p);
        if (admForm.notes || admForm.type) p = saveAdm(p);
      };

      const rowStyle = { display: "flex", gap: 6, alignItems: "center", flexWrap: "nowrap" };
      const smallInput = (extra) => ({ ...inputStyle, ...extra });
      const savedDot = (k) => flash[k] ? <span style={{ color: "#16a34a", fontSize: 11, fontWeight: 700, flexShrink: 0 }}>✓</span> : null;
      const sectionHdr = (color, label) => <div style={{ fontSize: 10, fontWeight: 700, color, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4, marginTop: 8 }}>{label}</div>;

      return (
        <div style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10, padding: "12px 14px", marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "#0f4c75" }}>Today — Quick Add</div>
            <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "#94a3b8", fontSize: 16 }}>✕</button>
          </div>

          {/* Clinical */}
          {sectionHdr("#1d4ed8", "🩺 Clinical Note")}
          <div style={rowStyle}>
            <input type="date" value={clinForm.date} onChange={e=>setClinForm(f=>({...f,date:e.target.value}))} style={smallInput({width:120})} />
            <select value={clinForm.type} onChange={e=>setClinForm(f=>({...f,type:e.target.value}))} style={smallInput({flex:"0 0 160px"})}>
              {(clinicalTypes||DEFAULT_CLINICAL_TYPES).map(t=><option key={t}>{t}</option>)}
            </select>
            <input placeholder="Notes" value={clinForm.notes} onChange={e=>setClinForm(f=>({...f,notes:e.target.value}))} style={smallInput({flex:1,minWidth:60})} />
            <button onClick={() => saveClin()} style={btnStyle("#94a3b8",true)}>Save</button>
            {savedDot("clin")}
          </div>

          {/* Admin */}
          {sectionHdr("#475569", "📋 Admin Note")}
          <div style={rowStyle}>
            <input type="date" value={admForm.date} onChange={e=>setAdmForm(f=>({...f,date:e.target.value}))} style={smallInput({width:120})} />
            <select value={admForm.type} onChange={e=>setAdmForm(f=>({...f,type:e.target.value}))} style={smallInput({flex:"0 0 160px"})}>
              {(adminTypes||DEFAULT_ADMIN_TYPES).map(t=><option key={t}>{t}</option>)}
            </select>
            <input placeholder="Notes" value={admForm.notes} onChange={e=>setAdmForm(f=>({...f,notes:e.target.value}))} style={smallInput({flex:1,minWidth:60})} />
            <button onClick={() => saveAdm()} style={btnStyle("#94a3b8",true)}>Save</button>
            {savedDot("adm")}
          </div>

          {/* AL */}
          {sectionHdr("#0f4c75", "📏 Axial Length")}
          <div style={rowStyle}>
            <input type="date" value={alForm.date} onChange={e => setAlForm(f=>({...f,date:e.target.value}))} style={smallInput({width:120})} />
            <input type="number" step="0.01" placeholder="OD" value={alForm.od} onChange={e => setAlForm(f=>({...f,od:e.target.value}))} style={smallInput({width:70})} />
            <input type="number" step="0.01" placeholder="OS" value={alForm.os} onChange={e => setAlForm(f=>({...f,os:e.target.value}))} style={smallInput({width:70})} />
            <input placeholder="Notes" value={alForm.notes} onChange={e => setAlForm(f=>({...f,notes:e.target.value}))} style={smallInput({flex:1,minWidth:60})} />
            <button onClick={() => saveAL()} style={btnStyle("#94a3b8",true)}>Save</button>
            {savedDot("al")}
          </div>

          {/* Refraction */}
          {sectionHdr("#0e7490", "🔍 Refraction")}
          <div style={{ fontSize: 11, color: "#64748b", marginBottom: 3 }}>
            <input type="date" value={rxForm.date} onChange={e => setRxForm(f=>({...f,date:e.target.value}))} style={smallInput({width:120,marginBottom:4})} />
          </div>
          {/* OD row */}
          <div style={{...rowStyle, marginBottom: 3}}>
            <span style={{ fontSize: 11, fontWeight: 700, color: "#0f4c75", width: 22, flexShrink: 0 }}>OD</span>
            <input type="number" step="0.25" placeholder="Sph" value={rxForm.odSph} onChange={e=>setRxForm(f=>({...f,odSph:e.target.value}))} style={smallInput({width:64})} />
            <input type="number" step="0.25" placeholder="Cyl" value={rxForm.odCyl} onChange={e=>setRxForm(f=>({...f,odCyl:e.target.value}))} style={smallInput({width:64})} />
            <input type="number" step="1" placeholder="Axis" value={rxForm.odAxis} onChange={e=>setRxForm(f=>({...f,odAxis:e.target.value}))} style={smallInput({width:55})} />
            <input placeholder="VA" value={rxForm.odVA} onChange={e=>setRxForm(f=>({...f,odVA:e.target.value}))} style={smallInput({width:60})} />
          </div>
          {/* OS row */}
          <div style={rowStyle}>
            <span style={{ fontSize: 11, fontWeight: 700, color: "#3b82f6", width: 22, flexShrink: 0 }}>OS</span>
            <input type="number" step="0.25" placeholder="Sph" value={rxForm.osSph} onChange={e=>setRxForm(f=>({...f,osSph:e.target.value}))} style={smallInput({width:64})} />
            <input type="number" step="0.25" placeholder="Cyl" value={rxForm.osCyl} onChange={e=>setRxForm(f=>({...f,osCyl:e.target.value}))} style={smallInput({width:64})} />
            <input type="number" step="1" placeholder="Axis" value={rxForm.osAxis} onChange={e=>setRxForm(f=>({...f,osAxis:e.target.value}))} style={smallInput({width:55})} />
            <input placeholder="VA" value={rxForm.osVA} onChange={e=>setRxForm(f=>({...f,osVA:e.target.value}))} style={smallInput({width:60})} />
            <button onClick={() => saveRx()} style={btnStyle("#94a3b8",true)}>Save</button>
            {savedDot("rx")}
          </div>

          <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #e2e8f0" }}>
            <button onClick={saveAll} style={btnStyle("#0f4c75")}>💾 Save All</button>
            <span style={{ fontSize: 11, color: "#94a3b8", marginLeft: 10 }}>Saves any fields that have data entered</span>
          </div>
        </div>
      );
    }

    // ── Combined Overview + Timeline Tab ──────────────────────────────────────
    function OverviewTimelineTab({ patient, onUpdate, pushUndo, undoStack, setUndoStack, clinicalTypes, adminTypes }) {
      const [showToday, setShowToday] = useState(false);
      const [showAddAL, setShowAddAL] = useState(false);
      const [showAddRx, setShowAddRx] = useState(false);
      const [showAddClin, setShowAddClin] = useState(false);
      const [showAddAdm, setShowAddAdm] = useState(false);
      const [showStory, setShowStory] = useState(false);
      const [storyData, setStoryData] = useState(null);
      const [showSummary, setShowSummary] = useState(false);
      const [editEvent, setEditEvent] = useState(null); // {event, kind: "clin"|"adm"}

      const [cols, setCols] = useState(() => ({
        al: true, rx: true, clinical: true, admin: true, lens: usesLens(patient),
      }));

      const [alForm, setAlForm] = useState({ date: today(), od: "", os: "", notes: "" });
      const [rxForm, setRxForm] = useState({ date: today(), odSph: "", odCyl: "", odAxis: "", odVA: "20/20", osSph: "", osCyl: "", osAxis: "", osVA: "20/20" });
      const [clinForm, setClinForm] = useState({ date: today(), type: (clinicalTypes||DEFAULT_CLINICAL_TYPES)[0], notes: "" });
      const [admForm, setAdmForm] = useState({ date: today(), type: (adminTypes||DEFAULT_ADMIN_TYPES)[0], notes: "" });
      const [flash, setFlash] = useState({});
      const doFlash = k => { setFlash(f => ({...f, [k]: true})); setTimeout(() => setFlash(f => ({...f, [k]: false})), 1800); };

      const als = [...(patient.alMeasurements || [])].sort((a, b) => b.date.localeCompare(a.date));
      const alsAsc = [...(patient.alMeasurements || [])].sort((a, b) => a.date.localeCompare(b.date));
      const rxs = [...(patient.refractions || [])].sort((a, b) => b.date.localeCompare(a.date));

      const deltaMap = {};
      alsAsc.forEach((m, i) => {
        if (i === 0) { deltaMap[m.id] = { deltaOD: null, deltaOS: null, deltaTime: null }; return; }
        const prev = alsAsc[i - 1];
        deltaMap[m.id] = { deltaOD: parseFloat(m.od) - parseFloat(prev.od), deltaOS: parseFloat(m.os) - parseFloat(prev.os), deltaTime: durationLabel(parseDate(prev.date), parseDate(m.date)) };
      });

      const allDates = [...new Set([
        ...als.map(m => m.date),
        ...rxs.map(r => r.date),
        ...(patient.clinicalEvents||[]).map(e => e.date),
        ...(patient.adminEvents||[]).map(e => e.date),
        ...(patient.lensHistory||[]).map(l => l.date),
      ])].sort((a, b) => b.localeCompare(a));

      const addAL = () => {
        if (!alForm.date || !alForm.od || !alForm.os) return;
        onUpdate({ ...patient, alMeasurements: [...(patient.alMeasurements||[]), { id: uid(), ...alForm, od: parseFloat(alForm.od), os: parseFloat(alForm.os) }] });
        setAlForm({ date: today(), od: "", os: "", notes: "" }); setShowAddAL(false); doFlash("al");
      };
      const addRx = () => {
        if (!rxForm.date || !rxForm.odSph || !rxForm.osSph) return;
        onUpdate({ ...patient, refractions: [...(patient.refractions||[]), { id: uid(), ...rxForm, odSph: parseFloat(rxForm.odSph), odCyl: parseFloat(rxForm.odCyl||0), odAxis: parseInt(rxForm.odAxis||0), osSph: parseFloat(rxForm.osSph), osCyl: parseFloat(rxForm.osCyl||0), osAxis: parseInt(rxForm.osAxis||0) }] });
        setRxForm({ date: today(), odSph: "", odCyl: "", odAxis: "", odVA: "20/20", osSph: "", osCyl: "", osAxis: "", osVA: "20/20" }); setShowAddRx(false); doFlash("rx");
      };
      const addClin = () => {
        if (!clinForm.date || !clinForm.type) return;
        onUpdate({ ...patient, clinicalEvents: [...(patient.clinicalEvents||[]), { id: uid(), ...clinForm }] });
        setClinForm({ date: today(), type: (clinicalTypes||DEFAULT_CLINICAL_TYPES)[0], notes: "" }); setShowAddClin(false); doFlash("clin");
      };
      const addAdm = () => {
        if (!admForm.date || !admForm.type) return;
        onUpdate({ ...patient, adminEvents: [...(patient.adminEvents||[]), { id: uid(), ...admForm }] });
        setAdmForm({ date: today(), type: (adminTypes||DEFAULT_ADMIN_TYPES)[0], notes: "" }); setShowAddAdm(false); doFlash("adm");
      };
      const removeAL = (id) => { pushUndo({ type: "restoreAL", patientId: patient.id, item: patient.alMeasurements.find(x => x.id === id) }); onUpdate({ ...patient, alMeasurements: patient.alMeasurements.filter(x => x.id !== id) }); };
      const removeRx = (id) => { pushUndo({ type: "restoreRx", patientId: patient.id, item: patient.refractions.find(x => x.id === id) }); onUpdate({ ...patient, refractions: patient.refractions.filter(x => x.id !== id) }); };
      const handleUndo = () => {
        if (!undoStack.length) return;
        const last = undoStack[undoStack.length - 1];
        if (last.type === "restoreAL" && last.patientId === patient.id) onUpdate({ ...patient, alMeasurements: [...(patient.alMeasurements||[]), last.item] });
        else if (last.type === "restoreRx" && last.patientId === patient.id) onUpdate({ ...patient, refractions: [...(patient.refractions||[]), last.item] });
        setUndoStack(s => s.slice(0, -1));
      };

      const saveEditedClin = (updated) => {
        onUpdate({ ...patient, clinicalEvents: patient.clinicalEvents.map(e => e.id === updated.id ? updated : e) });
        setEditEvent(null);
      };
      const saveEditedAdm = (updated) => {
        onUpdate({ ...patient, adminEvents: patient.adminEvents.map(e => e.id === updated.id ? updated : e) });
        setEditEvent(null);
      };
      const deleteClin = (id) => { onUpdate({ ...patient, clinicalEvents: patient.clinicalEvents.filter(e => e.id !== id) }); setEditEvent(null); };
      const deleteAdm = (id) => { onUpdate({ ...patient, adminEvents: patient.adminEvents.filter(e => e.id !== id) }); setEditEvent(null); };

      const printTable = () => {
        const sortedDates = [...allDates].sort((a,b) => a.localeCompare(b));
        const rows = sortedDates.map(date => {
          const al = patient.alMeasurements?.find(m => m.date === date);
          const rx = patient.refractions?.find(r => r.date === date);
          return `<tr><td>${fmtDate(date)}</td><td>${al ? al.od : '–'}</td><td>${al ? al.os : '–'}</td><td>${rx ? `${rx.odSph >= 0 ? '+' : ''}${rx.odSph} ${rx.odCyl ? rx.odCyl + ' ×' + rx.odAxis : 'sph'}` : '–'}</td><td>${rx ? `${rx.osSph >= 0 ? '+' : ''}${rx.osSph} ${rx.osCyl ? rx.osCyl + ' ×' + rx.osAxis : 'sph'}` : '–'}</td><td>${al?.notes || ''}</td></tr>`;
        }).join('');
        const w = window.open('', '_blank');
        w.document.write(`<html><head><title>${displayName(patient.name)} — Timeline</title><style>body{font-family:Arial,sans-serif;padding:20px;font-size:12px}table{border-collapse:collapse;width:100%}th{background:#0f4c75;color:#fff;padding:6px 8px}td{border:1px solid #e2e8f0;padding:5px 8px}</style></head><body><h2>${displayName(patient.name)} — Timeline</h2><table><thead><tr><th>Date</th><th>OD AL</th><th>OS AL</th><th>OD Rx</th><th>OS Rx</th><th>Notes</th></tr></thead><tbody>${rows}</tbody></table><script>window.print();<\/script></body></html>`);
        w.document.close();
      };

      function fmtRxCell(sph, cyl, axis) {
        const s = `${sph >= 0 ? "+" : ""}${Number(sph).toFixed(2)}`;
        if (!cyl || cyl === 0) return s + " sph";
        return `${s} ${cyl >= 0 ? "+" : ""}${Number(cyl).toFixed(2)} ×${axis}°`;
      }

      const COL_DEFS = [
        { key: "al", label: "AL" },
        { key: "rx", label: "Rx" },
        { key: "clinical", label: "Clinical" },
        { key: "admin", label: "Admin" },
        { key: "lens", label: "Lens" },
      ];

      const activeCols = COL_DEFS.filter(c => cols[c.key]);

      const formCard = { background: "#f0f9ff", border: "1px solid #bae6fd", borderRadius: 8, padding: "10px 12px", marginBottom: 10 };

      const story = als.length >= 2 ? generateStory(patient) : null;

      return (
        <div>
          {/* Clinical Summary dropdown */}
          <div style={{ marginBottom: 10 }}>
            <button onClick={() => setShowSummary(v => !v)}
              style={{ background: "none", border: "1px solid #bae6fd", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontSize: 12, color: "#0369a1", fontWeight: 600, display: "flex", alignItems: "center", gap: 5 }}>
              ✨ Clinical Summary {showSummary ? "▲" : "▼"}
            </button>
            {showSummary && story && (
              <div style={{ background: "#f0f9ff", border: "1px solid #bae6fd", borderRadius: 10, padding: "14px 16px", marginTop: 8 }}>
                <p style={{ fontSize: 13, color: "#0c4a6e", lineHeight: 1.7, margin: 0, marginBottom: 10 }}>{story.narrative}</p>
                {story.tableRows && story.tableRows.length > 0 && (
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, marginBottom: 10 }}>
                    <thead><tr style={{ background: "#e0f2fe" }}>
                      <th style={th}>Period</th><th style={th}>From Date</th><th style={th}>OD Δ</th><th style={th}>OS Δ</th>
                    </tr></thead>
                    <tbody>{story.tableRows.map((row, i) => (
                      <tr key={i}><td style={td}>{row.label}</td><td style={td}>{fmtDate(row.date)}</td>
                        <td style={{ ...td, color: row.dOD > 0.1 ? "#dc2626" : "#16a34a", fontWeight: 600 }}>{sgnFmt(row.dOD)}</td>
                        <td style={{ ...td, color: row.dOS > 0.1 ? "#dc2626" : "#16a34a", fontWeight: 600 }}>{sgnFmt(row.dOS)}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                )}
                <div style={{ background: "#fff", border: "1px solid #bae6fd", borderRadius: 8, padding: "10px 12px", fontSize: 13, color: "#0c4a6e" }}>
                  <strong>Clinical Interpretation:</strong> {story.interpretation}
                </div>
              </div>
            )}
            {showSummary && !story && <div style={{ fontSize: 12, color: "#94a3b8", padding: "8px 0" }}>Not enough AL data to generate summary.</div>}
          </div>

          {/* Toolbar */}
          <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap", alignItems: "center" }}>
            <button onClick={() => setShowToday(v => !v)} style={{ ...btnStyle("#0f4c75"), background: showToday ? "#0a3558" : "#0f4c75" }}>📋 Today</button>
            <button onClick={() => setShowAddAL(v => !v)} style={btnStyle("#1d4ed8")}>+ AL</button>
            <button onClick={() => setShowAddRx(v => !v)} style={btnStyle("#0891b2")}>+ Rx</button>
            <button onClick={() => setShowAddClin(v => !v)} style={btnStyle("#3730a3")}>+ Clinical</button>
            <button onClick={() => setShowAddAdm(v => !v)} style={btnStyle("#64748b")}>+ Admin</button>
            <button onClick={printTable} style={btnStyle("#475569")}>🖨 Print Table</button>
            {undoStack.some(u => u.patientId === patient.id) && <button onClick={handleUndo} style={btnStyle("#dc2626")}>↩ Undo</button>}
            {/* Column filters */}
            <div style={{ marginLeft: 6, display: "flex", gap: 4, alignItems: "center" }}>
              <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.4 }}>Filters:</span>
              {COL_DEFS.map(({ key, label }) => (
                <button key={key} onClick={() => setCols(c => ({ ...c, [key]: !c[key] }))}
                  style={{ background: cols[key] ? "#e2e8f0" : "#f8fafc", color: cols[key] ? "#475569" : "#cbd5e1", border: `1px solid ${cols[key] ? "#cbd5e1" : "#e2e8f0"}`, borderRadius: 20, padding: "3px 10px", cursor: "pointer", fontSize: 11, fontWeight: cols[key] ? 600 : 400 }}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* Today panel */}
          {showToday && <TodayPanel patient={patient} onUpdate={onUpdate} clinicalTypes={clinicalTypes} adminTypes={adminTypes} onClose={() => setShowToday(false)} />}

          {/* Individual add forms */}
          {showAddAL && (
            <div style={formCard}>
              <div style={{ fontWeight: 600, fontSize: 12, marginBottom: 8, color: "#0f4c75" }}>New AL Measurement</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
                {[["date","Date","date"],["od","OD (mm)","number"],["os","OS (mm)","number"]].map(([k,l,t]) => (
                  <label key={k} style={labelStyle}>{l}<input type={t} step={t==="number"?"0.01":undefined} value={alForm[k]} onChange={e => setAlForm(f => ({ ...f, [k]: e.target.value }))} style={inputStyle} /></label>
                ))}
                <label style={{ ...labelStyle, flex: "1 1 150px" }}>Notes<input value={alForm.notes} onChange={e => setAlForm(f => ({ ...f, notes: e.target.value }))} style={inputStyle} /></label>
                <button onClick={addAL} style={btnStyle("#0f4c75")}>Save</button>
                <button onClick={() => setShowAddAL(false)} style={btnStyle("#94a3b8")}>Cancel</button>
              </div>
            </div>
          )}
          {showAddRx && (
            <div style={formCard}>
              <div style={{ fontWeight: 600, fontSize: 12, marginBottom: 8, color: "#0891b2" }}>New Refraction</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "flex-end" }}>
                <label style={labelStyle}>Date<input type="date" value={rxForm.date} onChange={e => setRxForm(f => ({ ...f, date: e.target.value }))} style={inputStyle} /></label>
                {[["odSph","OD Sph"],["odCyl","OD Cyl"],["odAxis","OD Axis"],["osSph","OS Sph"],["osCyl","OS Cyl"],["osAxis","OS Axis"]].map(([k,l]) => (
                  <label key={k} style={{ ...labelStyle, flex: "0 0 72px" }}>{l}<input value={rxForm[k]} onChange={e => setRxForm(f => ({ ...f, [k]: e.target.value }))} style={inputStyle} /></label>
                ))}
                <button onClick={addRx} style={btnStyle("#0891b2")}>Save</button>
                <button onClick={() => setShowAddRx(false)} style={btnStyle("#94a3b8")}>Cancel</button>
              </div>
            </div>
          )}
          {showAddClin && (
            <div style={formCard}>
              <div style={{ fontWeight: 600, fontSize: 12, marginBottom: 8, color: "#3730a3" }}>New Clinical Note</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
                <label style={labelStyle}>Date<input type="date" value={clinForm.date} onChange={e=>setClinForm(f=>({...f,date:e.target.value}))} style={inputStyle} /></label>
                <label style={{...labelStyle,flex:"1 1 160px"}}>Type<select value={clinForm.type} onChange={e=>setClinForm(f=>({...f,type:e.target.value}))} style={inputStyle}>{(clinicalTypes||DEFAULT_CLINICAL_TYPES).map(t=><option key={t}>{t}</option>)}</select></label>
                <label style={{...labelStyle,flex:"2 1 180px"}}>Notes<input value={clinForm.notes} onChange={e=>setClinForm(f=>({...f,notes:e.target.value}))} style={inputStyle} /></label>
                <button onClick={addClin} style={btnStyle("#3730a3")}>Save</button>
                <button onClick={() => setShowAddClin(false)} style={btnStyle("#94a3b8")}>Cancel</button>
              </div>
            </div>
          )}
          {showAddAdm && (
            <div style={formCard}>
              <div style={{ fontWeight: 600, fontSize: 12, marginBottom: 8, color: "#64748b" }}>New Admin Note</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
                <label style={labelStyle}>Date<input type="date" value={admForm.date} onChange={e=>setAdmForm(f=>({...f,date:e.target.value}))} style={inputStyle} /></label>
                <label style={{...labelStyle,flex:"1 1 160px"}}>Type<select value={admForm.type} onChange={e=>setAdmForm(f=>({...f,type:e.target.value}))} style={inputStyle}>{(adminTypes||DEFAULT_ADMIN_TYPES).map(t=><option key={t}>{t}</option>)}</select></label>
                <label style={{...labelStyle,flex:"2 1 180px"}}>Notes<input value={admForm.notes} onChange={e=>setAdmForm(f=>({...f,notes:e.target.value}))} style={inputStyle} /></label>
                <button onClick={addAdm} style={btnStyle("#64748b")}>Save</button>
                <button onClick={() => setShowAddAdm(false)} style={btnStyle("#94a3b8")}>Cancel</button>
              </div>
            </div>
          )}

          {/* Edit modal */}
          {editEvent && editEvent.kind === "clin" && (
            <EditEventModal event={editEvent.event} types={clinicalTypes||DEFAULT_CLINICAL_TYPES}
              onSave={saveEditedClin} onDelete={() => deleteClin(editEvent.event.id)} onClose={() => setEditEvent(null)} />
          )}
          {editEvent && editEvent.kind === "adm" && (
            <EditEventModal event={editEvent.event} types={adminTypes||DEFAULT_ADMIN_TYPES}
              onSave={saveEditedAdm} onDelete={() => deleteAdm(editEvent.event.id)} onClose={() => setEditEvent(null)} />
          )}

          {/* Timeline table */}
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, tableLayout: "fixed" }}>
              <colgroup>
                <col style={{ width: 90 }} />
                {cols.al && <><col style={{ width: 78 }} /><col style={{ width: 78 }} /></>}
                {cols.rx && <><col style={{ width: 120 }} /><col style={{ width: 120 }} /></>}
                {cols.clinical && <col style={{ minWidth: 160 }} />}
                {cols.admin && <col style={{ minWidth: 160 }} />}
                {cols.lens && <col style={{ minWidth: 120 }} />}
                <col style={{ width: 52 }} />
              </colgroup>
              <thead>
                <tr style={{ background: "#0f4c75" }}>
                  <th style={{ ...th, background: "#0f4c75", color: "#fff" }}>Date</th>
                  {cols.al && <>
                    <th style={{ ...th, background: "#e8f0fe", color: "#0f4c75" }}>OD AL</th>
                    <th style={{ ...th, background: "#e8f0fe", color: "#3b82f6" }}>OS AL</th>
                  </>}
                  {cols.rx && <>
                    <th style={{ ...th, background: "#f0f9ff", color: "#0891b2" }}>OD Rx</th>
                    <th style={{ ...th, background: "#f0f9ff", color: "#0891b2" }}>OS Rx</th>
                  </>}
                  {cols.clinical && <th style={{ ...th, background: "#eef2ff", color: "#3730a3" }}>🩺 Clinical</th>}
                  {cols.admin    && <th style={{ ...th, background: "#f0fdfa", color: "#0891b2" }}>📋 Admin</th>}
                  {cols.lens     && <th style={{ ...th, background: "#f0f9ff", color: "#0369a1" }}>👁 Lens</th>}
                  <th style={{ ...th, background: "#f1f5f9", width: 52 }}></th>
                </tr>
              </thead>
              <tbody>
                {allDates.map((date, rowIdx) => {
                  const alEntry = als.find(m => m.date === date);
                  const rxEntry = rxs.find(r => r.date === date);
                  const clinEntries = (patient.clinicalEvents||[]).filter(e => e.date === date);
                  const admEntries  = (patient.adminEvents||[]).filter(e => e.date === date);
                  const lensEntries = (patient.lensHistory||[]).filter(l => l.date === date);
                  if (!activeCols.some(c => {
                    if (c.key === "al") return !!alEntry;
                    if (c.key === "rx") return !!rxEntry;
                    if (c.key === "clinical") return clinEntries.length > 0;
                    if (c.key === "admin") return admEntries.length > 0;
                    if (c.key === "lens") return lensEntries.length > 0;
                    return false;
                  })) return null;
                  const alDelta = alEntry ? deltaMap[alEntry.id] : null;
                  return (
                    <tr key={date} style={{ background: rowIdx % 2 === 0 ? "#fff" : "#f8fafc" }}>
                      <td style={{ ...td, verticalAlign: "top", paddingTop: 7 }}>
                        <div style={{ fontWeight: 600, fontSize: 11, whiteSpace: "nowrap" }}>{fmtDate(date)}</div>
                        {patient.therapyStartDate && (() => {
                          const startDt = parseDate(patient.therapyStartDate), rowDt = parseDate(date);
                          if (rowDt <= startDt) return null;
                          return <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 1 }}>{durationLabel(startDt, rowDt)}</div>;
                        })()}
                        {alDelta?.deltaTime && <div style={{ fontSize: 10, color: "#475569", marginTop: 1 }}>↑ {alDelta.deltaTime}</div>}
                      </td>
                      {cols.al && <>
                        <td style={{ ...td, verticalAlign: "top" }}>
                          {alEntry ? (
                            <div style={{ whiteSpace: "nowrap" }}>
                              <span style={{ color: "#0f4c75", fontWeight: 600 }}>{alEntry.od}</span>
                              {alDelta?.deltaOD !== null && <span style={{ fontSize: 10, color: "#94a3b8", marginLeft: 3 }}>({sgnFmt(alDelta.deltaOD)})</span>}
                              {alEntry.notes && <div style={{ fontSize: 10, color: "#64748b", marginTop: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{alEntry.notes}</div>}
                            </div>
                          ) : <span style={{ color: "#e2e8f0" }}>·</span>}
                        </td>
                        <td style={{ ...td, verticalAlign: "top" }}>
                          {alEntry ? (
                            <div style={{ whiteSpace: "nowrap" }}>
                              <span style={{ color: "#3b82f6", fontWeight: 600 }}>{alEntry.os}</span>
                              {alDelta?.deltaOS !== null && <span style={{ fontSize: 10, color: "#94a3b8", marginLeft: 3 }}>({sgnFmt(alDelta.deltaOS)})</span>}
                            </div>
                          ) : <span style={{ color: "#e2e8f0" }}>·</span>}
                        </td>
                      </>}
                      {cols.rx && <>
                        <td style={{ ...td, verticalAlign: "top", fontSize: 11, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                          {rxEntry ? fmtRxCell(rxEntry.odSph, rxEntry.odCyl, rxEntry.odAxis) : <span style={{ color: "#e2e8f0" }}>·</span>}
                        </td>
                        <td style={{ ...td, verticalAlign: "top", fontSize: 11, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                          {rxEntry ? fmtRxCell(rxEntry.osSph, rxEntry.osCyl, rxEntry.osAxis) : <span style={{ color: "#e2e8f0" }}>·</span>}
                        </td>
                      </>}
                      {cols.clinical && (
                        <td style={{ ...td, verticalAlign: "top", minWidth: 0, width: "auto" }}>
                          {clinEntries.length === 0 ? <span style={{ color: "#e2e8f0" }}>·</span> : (
                            <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                              {clinEntries.map(e => (
                                <div key={e.id} style={{ borderLeft: "3px solid #3730a3", paddingLeft: 6, position: "relative", paddingRight: 20 }}>
                                  <div style={{ fontWeight: 600, color: "#3730a3", fontSize: 11, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{e.type}</div>
                                  {e.notes && <div style={{ fontSize: 11, color: "#64748b", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{e.notes}</div>}
                                  <button onClick={() => setEditEvent({event: e, kind: "clin"})}
                                    style={{ position: "absolute", top: 0, right: 0, background: "none", border: "none", cursor: "pointer", color: "#94a3b8", fontSize: 11, padding: 0, lineHeight: 1 }} title="Edit">✏️</button>
                                </div>
                              ))}
                            </div>
                          )}
                        </td>
                      )}
                      {cols.admin && (
                        <td style={{ ...td, verticalAlign: "top", minWidth: 0, width: "auto" }}>
                          {admEntries.length === 0 ? <span style={{ color: "#e2e8f0" }}>·</span> : (
                            <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                              {admEntries.map(e => (
                                <div key={e.id} style={{ borderLeft: "3px solid #0891b2", paddingLeft: 6, position: "relative", paddingRight: 20 }}>
                                  <div style={{ fontWeight: 600, color: "#0891b2", fontSize: 11, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{e.type}</div>
                                  {e.notes && <div style={{ fontSize: 11, color: "#64748b", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{e.notes}</div>}
                                  <button onClick={() => setEditEvent({event: e, kind: "adm"})}
                                    style={{ position: "absolute", top: 0, right: 0, background: "none", border: "none", cursor: "pointer", color: "#94a3b8", fontSize: 11, padding: 0, lineHeight: 1 }} title="Edit">✏️</button>
                                </div>
                              ))}
                            </div>
                          )}
                        </td>
                      )}
                      {cols.lens && (
                        <td style={{ ...td, verticalAlign: "top" }}>
                          {lensEntries.length === 0 ? <span style={{ color: "#e2e8f0" }}>·</span> : (
                            <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                              {lensEntries.map(l => (
                                <div key={l.id} style={{ borderLeft: "3px solid #0369a1", paddingLeft: 6 }}>
                                  <div style={{ fontWeight: 600, color: "#0369a1", fontSize: 11, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{l.type}</div>
                                  {l.reason && <div style={{ fontSize: 11, color: "#64748b", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{l.reason}</div>}
                                </div>
                              ))}
                            </div>
                          )}
                        </td>
                      )}
                      <td style={{ ...td, verticalAlign: "top", whiteSpace: "nowrap", textAlign: "center" }}>
                        {alEntry && <button onClick={() => removeAL(alEntry.id)} style={{ background: "#fce7f3", border: "none", borderRadius: 4, padding: "2px 5px", cursor: "pointer", color: "#db2777", fontSize: 10, display: "block", marginBottom: 2, width: "100%" }}>AL ✕</button>}
                        {rxEntry && <button onClick={() => removeRx(rxEntry.id)} style={{ background: "#e0f2fe", border: "none", borderRadius: 4, padding: "2px 5px", cursor: "pointer", color: "#0891b2", fontSize: 10, display: "block", width: "100%" }}>Rx ✕</button>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ── BV Tab ─────────────────────────────────────────────────────────────────
    function BVTab({ patient, onUpdate, bvTests }) {
      const tests = bvTests || DEFAULT_BV_TESTS;
      const [adding, setAdding] = useState(false);
      const [form, setForm] = useState({ date: today(), results: {}, notes: "" });
      const entries = [...(patient.bvEntries||[])].sort((a,b) => a.date.localeCompare(b.date));
      const save = () => {
        if (!form.date) return;
        onUpdate({ ...patient, bvEntries: [...(patient.bvEntries||[]), { id: uid(), date: form.date, results: form.results, notes: form.notes }] });
        setForm({ date: today(), results: {}, notes: "" }); setAdding(false);
      };
      const remove = (id) => onUpdate({ ...patient, bvEntries: (patient.bvEntries||[]).filter(x => x.id !== id) });
      return (
        <div>
          <div style={{ display: "flex", gap: 10, marginBottom: 16, alignItems: "center" }}>
            <button onClick={() => setAdding(v => !v)} style={btnStyle("#0369a1")}>+ BV Entry</button>
            <span style={{ fontSize: 12, color: "#64748b" }}>Tests configured in Settings</span>
          </div>
          {adding && (
            <div style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10, padding: "14px 16px", marginBottom: 16 }}>
              <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 10 }}>New BV Assessment</div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 10 }}>
                <label style={labelStyle}>Date<input type="date" value={form.date} onChange={e => setForm(f => ({...f,date:e.target.value}))} style={{...inputStyle, width: 150}} /></label>
                <label style={{...labelStyle, flex:"2 1 220px"}}>Overall Notes<input value={form.notes} onChange={e => setForm(f => ({...f,notes:e.target.value}))} placeholder="Overall impressions…" style={inputStyle} /></label>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 16px", marginBottom: 12 }}>
                {tests.map(test => (
                  <label key={test} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
                    <span style={{ color: "#475569", minWidth: 160, flexShrink: 0 }}>{test}</span>
                    <input value={form.results[test]||""} onChange={e => setForm(f => ({...f,results:{...f.results,[test]:e.target.value}}))} placeholder="—" style={{ ...inputStyle, width: 100, fontSize: 12 }} />
                  </label>
                ))}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={save} style={btnStyle("#0369a1")}>Save</button>
                <button onClick={() => setAdding(false)} style={btnStyle("#94a3b8")}>Cancel</button>
              </div>
            </div>
          )}
          {entries.length === 0 && !adding && <div style={{ color: "#94a3b8", fontSize: 13, padding: "20px 0" }}>No BV assessments recorded.</div>}
          {entries.length > 0 && (
            <div style={{ overflowX: "auto" }}>
              <table style={{ borderCollapse: "collapse", fontSize: 12, width: "100%" }}>
                <thead>
                  <tr style={{ background: "#f1f5f9" }}>
                    <th style={{ ...th, minWidth: 160 }}>Test</th>
                    {entries.map(entry => (
                      <th key={entry.id} style={{ ...th, textAlign: "center", whiteSpace: "nowrap" }}>
                        <div>{fmtDate(entry.date)}</div>
                        <button onClick={() => remove(entry.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#cbd5e1", fontSize: 10, padding: 0, marginTop: 2 }}>✕ remove</button>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {tests.map((test, i) => (
                    <tr key={test} style={{ background: i % 2 === 0 ? "#fff" : "#f8fafc" }}>
                      <td style={{ ...td, fontWeight: 600, color: "#475569", whiteSpace: "nowrap" }}>{test}</td>
                      {entries.map(entry => (
                        <td key={entry.id} style={{ ...td, textAlign: "center", color: entry.results[test] ? "#1e293b" : "#cbd5e1" }}>{entry.results[test] || "–"}</td>
                      ))}
                    </tr>
                  ))}
                  <tr style={{ background: "#f0f9ff" }}>
                    <td style={{ ...td, fontWeight: 600, color: "#0369a1", fontStyle: "italic" }}>Notes</td>
                    {entries.map(entry => (
                      <td key={entry.id} style={{ ...td, fontSize: 11, color: "#64748b", fontStyle: "italic" }}>{entry.notes || "—"}</td>
                    ))}
                  </tr>
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    function ALGraphTab({ patient }) {
      return (
        <div>
          <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 8, color: "#0f4c75" }}>Axial Length Over Time</div>
          <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 12, display: "flex", gap: 16, flexWrap: "wrap" }}>
            <span>🟡 Yellow = Treatment Change</span><span>🟣 Purple = Rx visits</span><span>🟢 Green = therapy start</span>
            <span style={{ fontStyle: "italic" }}>Hover dots for values</span>
          </div>
          <ALGraph patient={patient} />
        </div>
      );
    }

    function LensHistoryTab({ patient, onUpdate }) {
      const [adding, setAdding] = useState(false);
      const isOrthoK = patient.therapy === "Ortho-K" || patient.combinationTherapy === "Ortho-K";
      const [form, setForm] = useState({ date: today(), type: patient.therapy || "Ortho-K", odBC: "", odPower: "", odDiam: "", odRZD1: "", odRZD2: "", odLZA1: "", odLZA2: "", odColor: "Green", osBC: "", osPower: "", osDiam: "", osRZD1: "", osRZD2: "", osLZA1: "", osLZA2: "", osColor: "Blue", reason: "", warrantyStart: "", warrantyMonths: "4" });
      const save = () => {
        if (!form.date) return;
        onUpdate({ ...patient, lensHistory: [...(patient.lensHistory||[]), { id: uid(), ...form, odBC: parseFloat(form.odBC)||0, odPower: parseFloat(form.odPower)||0, odDiam: parseFloat(form.odDiam)||0, osBC: parseFloat(form.osBC)||0, osPower: parseFloat(form.osPower)||0, osDiam: parseFloat(form.osDiam)||0 }] });
        setAdding(false);
      };
      const remove = (id) => onUpdate({ ...patient, lensHistory: patient.lensHistory.filter(x => x.id !== id) });
      const lenses = [...(patient.lensHistory||[])].sort((a,b) => b.date.localeCompare(a.date));
      const showOrthoKFields = isOrthoK || form.type === "Ortho-K";
      return (
        <div>
          <button onClick={() => setAdding(v => !v)} style={btnStyle("#0f4c75")}>+ Add Lens Entry</button>
          {adding && (
            <div style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10, padding: "14px 16px", marginTop: 14, flexDirection: "column", alignItems: "stretch" }}>
              <div style={{ fontWeight: 600, marginBottom: 10, fontSize: 13 }}>New Lens Parameters</div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 10 }}>
                <label style={labelStyle}>Date<input type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} style={inputStyle} /></label>
                <label style={labelStyle}>Type<input value={form.type} onChange={e => setForm(f => ({ ...f, type: e.target.value }))} style={inputStyle} /></label>
                <label style={{ ...labelStyle, flex: "1 1 200px" }}>Reason<input value={form.reason} onChange={e => setForm(f => ({ ...f, reason: e.target.value }))} style={inputStyle} /></label>
                <label style={labelStyle}>Warranty Start<input type="date" value={form.warrantyStart} onChange={e => setForm(f => ({ ...f, warrantyStart: e.target.value }))} style={inputStyle} /></label>
                <label style={{ ...labelStyle, flex: "0 0 80px" }}>Warranty (mo)<input type="number" step="0.5" value={form.warrantyMonths} onChange={e => setForm(f => ({ ...f, warrantyMonths: e.target.value }))} style={inputStyle} /></label>
              </div>
              {[["OD","od"],["OS","os"]].map(([eye,prefix]) => (
                <div key={eye} style={{ marginBottom: 10 }}>
                  <div style={{ fontWeight: 600, fontSize: 12, marginBottom: 6, color: prefix==="od"?"#0f4c75":"#3b82f6" }}>{eye}</div>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    {[["BC","BC"],["Power","Power"],["Diam","Diam"]].map(([l,k]) => (
                      <label key={k} style={labelStyle}>{l}<input value={form[`${prefix}${k}`]} onChange={e => setForm(f => ({ ...f, [`${prefix}${k}`]: e.target.value }))} style={{ ...inputStyle, width: 70 }} /></label>
                    ))}
                    {showOrthoKFields && [["RZD1","RZD1"],["RZD2","RZD2"],["LZA1","LZA1"],["LZA2","LZA2"]].map(([l,k]) => (
                      <label key={k} style={labelStyle}>{l}<input value={form[`${prefix}${k}`]} onChange={e => setForm(f => ({ ...f, [`${prefix}${k}`]: e.target.value }))} style={{ ...inputStyle, width: 60 }} /></label>
                    ))}
                    <label style={labelStyle}>Color<input value={form[`${prefix}Color`]} onChange={e => setForm(f => ({ ...f, [`${prefix}Color`]: e.target.value }))} style={{ ...inputStyle, width: 80 }} /></label>
                  </div>
                </div>
              ))}
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={save} style={btnStyle("#0f4c75")}>Save</button>
                <button onClick={() => setAdding(false)} style={btnStyle("#94a3b8")}>Cancel</button>
              </div>
            </div>
          )}
          <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 12 }}>
            {lenses.map(l => (
              <div key={l.id} style={{ border: "1px solid #e2e8f0", borderRadius: 10, padding: "14px 16px", background: "#f8fafc" }}>
                {(() => {
                    const wStart = l.warrantyStart ? parseDate(l.warrantyStart) : null;
                    const wMonths = l.warrantyMonths ? parseFloat(l.warrantyMonths) : 4;
                    const wExpiry = wStart ? new Date(wStart.getTime() + wMonths * 30.44 * 86400000) : null;

    // ── Calculator (unchanged) ─────────────────────────────────────────────────
    const CALC_INT_EFFECT = { none:0, ortho_k:0.50, misight:0.55, atropine_01:0.20, atropine_05:0.50, stellest:0.575, mf_soft:0.40, combo:0.70, stellest_atro:0.65 };
    const CALC_INT_LABELS = { none:'No intervention', ortho_k:'Orthokeratology', misight:'MiSight 1 day', atropine_01:'Atropine 0.01%', atropine_05:'Atropine 0.05%', stellest:'Stellest/DIMS', mf_soft:'MF soft CL', combo:'Ortho-K + atropine', stellest_atro:'Stellest + atropine' };
    const CALC_ETH_MULT = { east_asian:1.55, south_asian:1.20, hispanic:1.10, white:1.00, black:0.75, mixed:1.05 };
    const CALC_ETH_LABELS = { east_asian:'East Asian', south_asian:'South Asian', hispanic:'Hispanic/Latino', white:'Caucasian', black:'African', mixed:'Mixed/Other' };
    function calcBaseProgRate(age) { if(age<7)return 1.10;if(age<9)return 0.90;if(age<11)return 0.75;if(age<13)return 0.65;if(age<15)return 0.45;if(age<17)return 0.25;return 0.10; }
    function calcPredictOnset(age,rx,al,ethnicity,parents,outdoor){const em=CALC_ETH_MULT[ethnicity]||1.0;let plusReserve=(rx!==null&&rx!=='')?parseFloat(rx):0.75;let annualLoss=0.18*em;if(parents==2)annualLoss*=1.30;else if(parents==1)annualLoss*=1.15;if(outdoor==0)annualLoss*=1.20;else if(outdoor==2)annualLoss*=0.85;if(al!==null){const normAL=22.0+(age-5)*0.1,excess=al-normAL;if(excess>1.0)annualLoss*=1.25;else if(excess>0.5)annualLoss*=1.12;}let simRx=plusReserve,simAge=age;while(simRx>0&&simAge<25){simRx-=annualLoss;simAge++;}return simAge>=25?null:Math.round(simAge);}
    function calcComputeRisk(inputs){let score=0;const factors=[];const{age,rx,al,onset,prog,ethnicity,parents,parent_rx,outdoor,nearwork,isPreMyope,predictedOnset,rf_premature,rf_urban,rf_asian_school,rf_atopy}=inputs;const em=CALC_ETH_MULT[ethnicity]||1.0;if(isPreMyope){if(rx!==null&&rx<=0.50){score+=20;factors.push({label:`Low hyperopic buffer (${rx>=0?'+':''}${rx}D)`,pts:20});}else if(rx!==null&&rx<=1.00){score+=10;factors.push({label:`Moderate hyperopic reserve (+${rx}D)`,pts:10});}if(predictedOnset!==null){const yrs=predictedOnset-age;if(yrs<=1){score+=20;factors.push({label:'Onset predicted within 1 year',pts:20});}else if(yrs<=2){score+=12;factors.push({label:'Onset predicted within 2 years',pts:12});}else if(yrs<=3){score+=6;factors.push({label:'Onset predicted within 3 years',pts:6});}}}else{if(onset!==null){if(onset<=6){score+=25;factors.push({label:'Very early onset (<=6 yrs)',pts:25});}else if(onset<=8){score+=15;factors.push({label:'Early onset (<=8 yrs)',pts:15});}else if(onset<=10){score+=8;factors.push({label:'Onset <=10 yrs',pts:8});}}if(rx!==null){if(rx<=-5){score+=22;factors.push({label:`High myopia (${rx}D)`,pts:22});}else if(rx<=-3){score+=14;factors.push({label:`Moderate myopia (${rx}D)`,pts:14});}else if(rx<=-1){score+=7;factors.push({label:`Low myopia (${rx}D)`,pts:7});}}if(prog&&prog>=0.75){score+=15;factors.push({label:`Rapid progression (${prog}D/yr)`,pts:15});}}if(al!==null){const normAL=22.0+(age-5)*0.1,excess=al-normAL;if(excess>1.5){score+=18;factors.push({label:`AL ${al}mm (>1.5mm above norm)`,pts:18});}else if(excess>0.8){score+=10;factors.push({label:`AL ${al}mm (elongated for age)`,pts:10});}}if(parents==2){score+=20;factors.push({label:'Both parents myopic',pts:20});}else if(parents==1){score+=10;factors.push({label:'One parent myopic',pts:10});}if(parent_rx!==null&&parent_rx<=-4){score+=8;factors.push({label:`Parental high myopia (${parent_rx}D)`,pts:8});}if(em>=1.4){score+=12;factors.push({label:'East Asian ancestry',pts:12});}else if(em>=1.1){score+=6;factors.push({label:'South/Hispanic ancestry',pts:6});}else if(em<0.9){score-=5;factors.push({label:'African ancestry (lower risk)',pts:-5});}if(outdoor==0){score+=10;factors.push({label:'<1 hr/day outdoors',pts:10});}else if(outdoor==1){score+=4;factors.push({label:'1-2 hrs/day outdoors',pts:4});}else{score-=5;factors.push({label:'2+ hrs/day outdoors',pts:-5});}if(nearwork==2){score+=8;factors.push({label:'4+ hrs near work',pts:8});}else if(nearwork==1){score+=4;factors.push({label:'2-4 hrs near work',pts:4});}if(rf_premature){score+=5;factors.push({label:'Premature birth',pts:5});}if(rf_urban){score+=4;factors.push({label:'Urban environment',pts:4});}if(rf_asian_school){score+=5;factors.push({label:'High academic load',pts:5});}if(rf_atopy){score+=3;factors.push({label:'Atopic conditions',pts:3});}return{score:Math.max(0,Math.min(100,score)),factors};}
    function calcBuildProjection(inputs){const{age,rx,prog,ethnicity,intervention,isPreMyope,predictedOnset}=inputs;const em=CALC_ETH_MULT[ethnicity]||1.0,intEffect=CALC_INT_EFFECT[intervention]||0;const maxAge=22;const ages=[],untreated=[],treated=[];function annualRate(a){return(prog&&!isPreMyope)?prog*em:calcBaseProgRate(a)*em;}if(isPreMyope){const onsetAge=predictedOnset||(age+3),startPlus=(rx!==null&&rx!=='')?parseFloat(rx):0.75;const steps=Math.max(onsetAge-age,1),annualDrop=startPlus/steps;let simPlus=startPlus;for(let a=age;a<=onsetAge;a++){ages.push(a);const v=+Math.max(simPlus,0).toFixed(2);untreated.push(v);treated.push(v);simPlus-=annualDrop;}let rxU=0,rxT=0;for(let a=onsetAge;a<maxAge;a++){const r=annualRate(a);rxU=Math.max(rxU-r,-22);rxT=Math.max(rxT-r*(1-intEffect),-22);ages.push(a+1);untreated.push(+rxU.toFixed(2));treated.push(+rxT.toFixed(2));}}else{let rxU=parseFloat(rx)||0,rxT=parseFloat(rx)||0;ages.push(age);untreated.push(+rxU.toFixed(2));treated.push(+rxT.toFixed(2));for(let a=age;a<maxAge;a++){const r=annualRate(a);rxU=Math.max(rxU-r,-22);rxT=Math.max(rxT-r*(1-intEffect),-22);ages.push(a+1);untreated.push(+rxU.toFixed(2));treated.push(+rxT.toFixed(2));}}return{ages,untreated,treated};}
    function getRiskTier(score){if(score>=70)return{label:'High Risk',color:'#c94040',bg:'#fff1f2'};if(score>=45)return{label:'Moderate Risk',color:'#e8a245',bg:'#fef3c7'};if(score>=20)return{label:'Low-Moderate',color:'#2a7d6e',bg:'#e8f5f2'};return{label:'Low Risk',color:'#16a34a',bg:'#f0fdf4'};}

    function CalculatorTab({ patient, onUpdate }) {
      const als=[...(patient.alMeasurements||[])].sort((a,b)=>a.date.localeCompare(b.date));const rxs=[...(patient.refractions||[])].sort((a,b)=>a.date.localeCompare(b.date));const latestAL=als[als.length-1],latestRx=rxs[rxs.length-1];const ageFromDOB=()=>{if(!patient.dob)return 10;const birth=new Date(patient.dob+"T00:00:00"),now=new Date();let y=now.getFullYear()-birth.getFullYear();if(now.getMonth()<birth.getMonth()||(now.getMonth()===birth.getMonth()&&now.getDate()<birth.getDate()))y--;return Math.max(1,Math.min(y,30));};const onsetFromData=()=>{if(!patient.therapyStartDate||!patient.dob)return'';const birth=new Date(patient.dob+"T00:00:00"),start=new Date(patient.therapyStartDate+"T00:00:00");let y=start.getFullYear()-birth.getFullYear();if(start.getMonth()<birth.getMonth()||(start.getMonth()===birth.getMonth()&&start.getDate()<birth.getDate()))y--;return String(Math.max(1,Math.min(y,20)));};const progFromAL=()=>{if(als.length<2)return'';const last=als[als.length-1],prev=als[als.length-2],days=daysBetween(parseDate(prev.date),parseDate(last.date));return days>0?((parseFloat(last.od)-parseFloat(prev.od))/days*365).toFixed(2):'';};const interventionFromTherapy=()=>{const t=patient.therapy;if(t==='Ortho-K')return'ortho_k';if(t==='MiSight')return'misight';if(t==='Atropine')return patient.atropineConc==='0.01%'?'atropine_01':'atropine_05';if(t==='Stellest')return'stellest';return'none';};const parentsFromData=()=>{const p1=patient.parent1Myopia||'',p2=patient.parent2Myopia||'';const m1=(p1&&p1!=='None'&&p1!=='Unknown')?1:0,m2=(p2&&p2!=='None'&&p2!=='Unknown')?1:0;return String(m1+m2);};const worseRx=latestRx?(Math.min(latestRx.odSph,latestRx.osSph)):null;const worseAL=latestAL?(Math.max(latestAL.od,latestAL.os)):null;const ageVal=ageFromDOB();
      const[form,setForm]=useState({age:String(ageVal),sex:'F',ethnicity:'east_asian',rx:worseRx!==null?String(worseRx):'',al:worseAL!==null?String(worseAL):'',onset:onsetFromData(),prog:progFromAL(),parents:parentsFromData(),parent_rx:'',outdoor:'1',nearwork:'1',intervention:interventionFromTherapy(),rf_premature:false,rf_urban:false,rf_asian_school:false,rf_atopy:false});

      const saveSnapshot=()=>{if(!result)return;const worseRxSnap=latestRx?Math.min(latestRx.odSph,latestRx.osSph):null,worseALSnap=latestAL?Math.max(latestAL.od,latestAL.os):null;const snap={id:uid(),date:today(),label:snapshotLabel||`Assessment ${fmtDate(today())}`,inputs:result.inputs,score:result.score,tier:result.tier.label,rxAt18U:result.rxAt18U,rxAt18T:result.rxAt18T,intervention:form.intervention,actualRx:worseRxSnap,actualAL:worseALSnap};onUpdate({...patient,calcSnapshots:[...(patient.calcSnapshots||[]),snap]});setSaved(true);setSnapshotLabel('');setTimeout(()=>setSaved(false),2500);};

:'#f1f5f9'}}><th style={{...th,fontSize:10}}>Age</th>{result.proj.ages.filter(a=>a>=result.inputs.age&&a<=22).map(a=><th key={a} style={{...th,fontSize:10,textAlign:'center'}}>{a}</th>)}</tr></thead><tbody><tr><td style={{...td,fontSize:11,fontWeight:600,color:'#64748b',whiteSpace:'nowrap'}}>Untreated</td>{result.proj.ages.filter(a=>a>=result.inputs.age&&a<=22).map(a=>{const idx=result.proj.ages.indexOf(a),v=result.proj.untreated[idx];return<td key={a} style={{...td,textAlign:'center',color:v<=-6?'#c94040':'#1e293b'}}>{v>=0?'+':''}{v?.toFixed(2)}</td>;})}</tr>{form.intervention!=='none'&&<tr><td style={{...td,fontSize:11,fontWeight:600,color:'#2a7d6e',whiteSpace:'nowrap'}}>{CALC_INT_LABELS[form.intervention]}</td>{result.proj.ages.filter(a=>a>=result.inputs.age&&a<=22).map(a=>{const idx=result.proj.ages.indexOf(a),v=result.proj.treated[idx];return<td key={a} style={{...td,textAlign:'center',color:'#2a7d6e'}}>{v>=0?'+':''}{v?.toFixed(2)}</td>;})}</tr>}</tbody></table></div><div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}><input value={snapshotLabel} onChange={e=>setSnapshotLabel(e.target.value)} placeholder="Label (e.g. Initial assessment Jan 2023)" style={{...inputStyle,width:260,fontSize:12}} /><button onClick={saveSnapshot} style={btnStyle('#22c55e')}>Save Snapshot</button>{saved&&<span style={{fontSize:12,color:'#16a34a',fontWeight:600}}>Saved!</span>}</div></div>)}{snapshots.length>0&&(<div><div style={{fontWeight:700,fontSize:13,color:'#0f4c75',marginBottom:10}}>Saved Snapshots</div><div style={{overflowX:'auto'}}><table style={{borderCollapse:'collapse',fontSize:12,width:'100%'}}><thead><tr style={{background:'#f1f5f9'}}><th style={th}>Date</th><th style={th}>Label</th><th style={{...th,textAlign:'center'}}>Risk</th><th style={th}>Tier</th><th style={{...th,textAlign:'center'}}>Pred @18 (untx)</th><th style={{...th,textAlign:'center'}}>Pred @18 (tx)</th><th style={{...th,textAlign:'center'}}>Actual Rx</th><th style={{...th,textAlign:'cen     function ExportTab({ patient }) {
      const generate = () => {
        const als = [...(patient.alMeasurements||[])].sort((a,b) => a.date.localeCompare(b.date));
        const rxs = [...(patient.refractions||[])].sort((a,b) => a.date.localeCompare(b.date));
        const lines = [
          `THE SPARK OPTOMETRY — MYOPIA MANAGEMENT REPORT`, `${"=".repeat(52)}`,
          `Patient: ${displayName(patient.name)}`, `DOB: ${fmtDate(patient.dob)}`,
          `Location: ${patient.location}`,
          `Therapy: ${patient.therapy}${patient.combinationTherapy ? " + " + patient.combinationTherapy : ""}`,
          `Status: ${patient.status}`, `Initiating Doctor: ${patient.initiatingDoctor}`,
          `Managing Doctor: ${patient.managingDoctor || patient.initiatingDoctor}`,
          patient.parent1Myopia ? `Parent 1 Myopia: ${patient.parent1Myopia}` : "",
          patient.parent2Myopia ? `Parent 2 Myopia: ${patient.parent2Myopia}` : "",
          ``, `AXIAL LENGTH MEASUREMENTS`, `${"─".repeat(40)}`,
          ...als.map(m => `${fmtDate(m.date)}  OD: ${m.od} mm  OS: ${m.os} mm${m.notes ? "  — " + m.notes : ""}`), ``,
          `REFRACTIONS`, `${"─".repeat(40)}`,
          ...rxs.map(r => `${fmtDate(r.date)}  OD: ${r.odSph>=0?"+":""}${r.odSph} ${r.odCyl} x${r.odAxis}  OS: ${r.osSph>=0?"+":""}${r.osSph} ${r.osCyl} x${r.osAxis}`), ``,
          `CLINICAL EVENTS`, `${"─".repeat(40)}`,
          ...(patient.clinicalEvents||[]).sort((a,b) => b.date.localeCompare(a.date)).map(e => `${fmtDate(e.date)}  ${e.type}${e.notes?" — "+e.notes:""}`),
        ].filter(l => l !== "");
        const blob = new Blob([lines.join("\n")], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `${patient.name.replace(/\s+/g,"-")}-myopia-report.txt`;
        a.click(); URL.revokeObjectURL(url);
      };
      return (
        <div>
          <div style={{ fontSize: 13, color: "#64748b", marginBottom: 16 }}>Export a plain-text clinical summary (staff alert and notes excluded).</div>
          <button onClick={generate} style={btnStyle("#0f4c75")}>⬇ Download Report (.txt)</button>
        </div>
      );
    }
